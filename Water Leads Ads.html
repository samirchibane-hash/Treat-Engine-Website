body { font-family: 'DM Sans', sans-serif; background: #1a1a1a; }

:root {
  --cream: #faf7f2;
  --cream-mid: #f0ebe0;
  --cream-dark: #e5ddd0;
  --ink: #1c1814;
  --ink-mid: #3d3530;

.ad { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; font-family: 'DM Sans', sans-serif; }

.pill { display: inline-flex; align-items: center; gap: 6px; background: var(--blue-lt); color: var(--blue); font-size: 10.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; }
.pill-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); }

.cta-btn { display: inline-block; background: var(--blue); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: 13px 26px; border-radius: 6px; cursor: pointer; }
.cta-btn-navy { background: var(--navy); }

.check-row { display: flex; align-items: flex-start; gap: 10px; font-size: 13.5px; color: var(--ink-mid); line-height: 1.45; }
.check-icon { width: 18px; height: 18px; border-radius: 4px; background: var(--blue); flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
