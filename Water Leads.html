<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treat Engine — Sales & Marketing for Water Treatment Dealers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --cream:     #faf7f2;
  --cream-mid: #f0ebe0;
  --cream-dark:#e5ddd0;
  --ink:       #1c1814;
  --ink-mid:   #3d3530;
  --ink-muted: #7a6f65;
  --navy:      #1a2744;
  --navy-light:#243460;
  --gold:      oklch(0.72 0.10 72);
  --gold-dark: oklch(0.58 0.12 68);
  --blue:      #3b82f6;
  --blue-light: #eff6ff;
  --blue-dark:  #1d4ed8;
  --white:     #fffefb;
  --border:    rgba(28,24,20,0.10);
  --border-mid:rgba(28,24,20,0.06);
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.12;}
p{line-height:1.75;}
a{text-decoration:none;color:inherit;}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,247,242,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1180px;margin:0 auto;padding:0 32px;height:70px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo img{height:34px;width:auto;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--ink-muted);padding:7px 14px;border-radius:6px;letter-spacing:.01em;transition:all .2s;}
.nav-links a:hover{color:var(--ink);background:var(--cream-mid);}
.nav-links a.active{color:var(--blue);font-weight:600;background:var(--blue-light);}
.nav-cta{background:var(--blue);color:#fff;border:none;padding:11px 22px;border-radius:6px;font-size:13.5px;font-weight:600;cursor:pointer;letter-spacing:0.02em;transition:background .2s,transform .15s;font-family:'DM Sans',sans-serif;}
.nav-cta:hover{background:var(--blue-dark);transform:translateY(-1px);}

/* ── HERO ── */
.hero{padding:130px 32px 0;max-width:1180px;margin:0 auto;}
.hero-top{display:grid;grid-template-columns:1fr 420px;gap:80px;align-items:end;padding-bottom:72px;border-bottom:1px solid var(--border);}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:28px;}
.hero-tag-line{width:28px;height:1.5px;background:var(--blue);}
.hero h1{font-size:clamp(46px,5.5vw,74px);font-weight:600;color:var(--ink);margin-bottom:28px;line-height:1.06;letter-spacing:-0.02em;}
.hero h1 em{font-style:italic;color:var(--navy);}
.hero-sub{font-size:17px;color:var(--ink-muted);max-width:520px;margin-bottom:40px;font-weight:400;line-height:1.8;}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.btn-dark{background:var(--blue);color:#fff;border:none;padding:15px 28px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:0.01em;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-dark:hover{background:var(--blue-dark);transform:translateY(-2px);}
.btn-text{background:none;border:none;font-size:15px;font-weight:500;color:var(--ink-muted);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;padding:15px 0;transition:color .2s;}
.btn-text:hover{color:var(--ink);}
.hero-aside{padding-bottom:8px;}
.hero-aside-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:16px;}
.hero-stat-row{padding:18px 0;border-bottom:1px solid var(--border-mid);display:flex;flex-direction:column;gap:4px;}
.hero-stat-row:last-child{border-bottom:none;}
.hero-stat-num{font-family:'Playfair Display',serif;font-size:38px;font-weight:600;color:var(--navy);line-height:1;}
.hero-stat-label{font-size:13px;color:var(--ink-muted);}

/* Ticker */
.hero-ticker{padding:22px 0;overflow:hidden;white-space:nowrap;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:0;}
.hero-ticker-inner{display:inline-flex;gap:0;animation:ticker 28s linear infinite;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.hero-ticker-item{display:inline-flex;align-items:center;gap:12px;padding:0 32px;font-size:13px;color:var(--ink-muted);font-weight:500;}
.hero-ticker-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0;}

/* ── TRUST ── */
.trust{padding:60px 32px;background:var(--white);}
.trust-inner{max-width:1180px;margin:0 auto;}
.trust-label{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:28px;}
.trust-logos{display:flex;align-items:center;justify-content:space-between;gap:28px;flex-wrap:nowrap;width:100%;}
.trust-logo{display:flex;align-items:center;justify-content:center;height:32px;flex:0 1 auto;min-width:0;filter:grayscale(100%);opacity:0.45;transition:opacity .25s ease, filter .25s ease;}
.trust-logo img{max-height:100%;max-width:100%;width:auto;height:auto;display:block;object-fit:contain;}
.trust-logo:hover{opacity:1;filter:grayscale(0%);}
/* circular logos read smaller at same height — bump them */
.trust-logo.is-circle{height:40px;}
@media (max-width: 900px){
  .trust-logos{flex-wrap:wrap;justify-content:center;gap:24px 32px;}
  .trust-logo{height:28px;}
  .trust-logo.is-circle{height:36px;}
}

/* ── SECTION SHARED ── */
.section{padding:110px 32px;}
.section-inner{max-width:1180px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';display:block;width:20px;height:1.5px;background:var(--blue);}
.section-title{font-size:clamp(30px,3.8vw,50px);font-weight:600;color:var(--ink);margin-bottom:20px;letter-spacing:-0.02em;}
.section-sub{font-size:16.5px;color:var(--ink-muted);max-width:540px;line-height:1.8;}

/* ── HOW IT WORKS ── */
.how-section{background:var(--white);}
.how-header{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:end;margin-bottom:72px;padding-bottom:56px;border-bottom:1px solid var(--border);}
.how-steps{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.how-step{padding:36px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.how-step:nth-child(odd){padding-right:40px;border-right:1px solid var(--border);}
.how-step:nth-child(even){padding-left:40px;}
.how-step:nth-last-child(-n+2){border-bottom:none;}
.how-step-num{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--ink-muted);margin-bottom:14px;letter-spacing:0.06em;position:relative;z-index:1;}
.how-step-title{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:8px;font-family:'Playfair Display',serif;transition:color .2s;position:relative;z-index:1;max-width:calc(100% - 110px);}
.how-step:hover .how-step-title{color:var(--navy);}
.how-step-desc{font-size:13.5px;color:var(--ink-muted);line-height:1.7;position:relative;z-index:1;max-width:calc(100% - 110px);}
/* Even-numbered steps (02, 04…): graphic sits on the left, push text right */
.how-step:nth-child(even) .how-step-num,
.how-step:nth-child(even) .how-step-title,
.how-step:nth-child(even) .how-step-desc{margin-left:110px;max-width:calc(100% - 110px);}

/* Decorative animated graphics for each step */
.how-step-gfx{position:absolute;top:50%;right:18px;transform:translateY(-50%);width:92px;height:92px;opacity:0.35;transition:opacity .35s ease;pointer-events:none;z-index:0;}
.how-step:nth-child(even) .how-step-gfx{right:auto;left:18px;}
.how-step:hover .how-step-gfx{opacity:0.7;}
.how-step-gfx svg{width:100%;height:100%;display:block;overflow:visible;}
.how-step-gfx .stroke{stroke:var(--navy);fill:none;stroke-width:1.2;vector-effect:non-scaling-stroke;}
.how-step-gfx .fill{fill:var(--navy);}

/* 01 Onboarding & CRM setup — data flowing into central hub + territory lock */
@keyframes hw-flow{0%{stroke-dashoffset:60;}100%{stroke-dashoffset:0;}}
.hw-flow{stroke-dasharray:6 10;stroke-dashoffset:60;animation:hw-flow 2.6s linear infinite;stroke-linecap:round;}
@keyframes hw-node-in{0%,20%{transform:scale(0.2);opacity:0;}35%,85%{transform:scale(1);opacity:1;}100%{transform:scale(1);opacity:1;}}
.hw-node{transform-origin:center;animation:hw-node-in 2.6s ease-out infinite both;}
.hw-node-a{animation-delay:0s;}
.hw-node-b{animation-delay:0.25s;}
.hw-node-c{animation-delay:0.5s;}
.hw-node-d{animation-delay:0.75s;}
@keyframes hw-hub-pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:0.85;}}
.hw-hub{transform-origin:center;animation:hw-hub-pulse 2.6s ease-in-out infinite;}
@keyframes hw-lock-draw{0%,25%{stroke-dashoffset:20;}55%,100%{stroke-dashoffset:0;}}
.hw-lock{stroke-dasharray:20;stroke-dashoffset:20;animation:hw-lock-draw 2.6s ease-out infinite;stroke-linecap:round;stroke-linejoin:round;}

/* 02 Creative — scanning line over frame */
@keyframes hw-scan{0%{transform:translateY(-30px);opacity:0;}10%,90%{opacity:1;}100%{transform:translateY(30px);opacity:0;}}
.hw-scan-line{animation:hw-scan 2.6s ease-in-out infinite;}
@keyframes hw-play-pulse{0%,100%{opacity:0.6;}50%{opacity:1;}}
.hw-play{animation:hw-play-pulse 2.6s ease-in-out infinite;}

/* 03 Orbiting dots */
@keyframes hw-orbit{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.hw-orbit{transform-origin:50% 50%;animation:hw-orbit 6s linear infinite;}
.hw-orbit-rev{transform-origin:50% 50%;animation:hw-orbit 8s linear infinite reverse;}

/* 04 Calendar check */
@keyframes hw-check-draw{0%,15%{stroke-dashoffset:24;}40%,100%{stroke-dashoffset:0;}}
.hw-check{stroke-dasharray:24;stroke-dashoffset:24;animation:hw-check-draw 2.8s ease-out infinite;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.6;}
@keyframes hw-cell-fill{0%,40%{opacity:0;}55%,100%{opacity:0.25;}}
.hw-cell-active{animation:hw-cell-fill 2.8s ease-out infinite;}

/* 05 Bars rising */
@keyframes hw-bar{0%,100%{transform:scaleY(0.35);}50%{transform:scaleY(1);}}
.hw-bar{transform-origin:50% 100%;animation:hw-bar 2.4s ease-in-out infinite;}
.hw-bar:nth-child(1){animation-delay:0s;}
.hw-bar:nth-child(2){animation-delay:0.2s;}
.hw-bar:nth-child(3){animation-delay:0.4s;}
.hw-bar:nth-child(4){animation-delay:0.6s;}
@keyframes hw-arrow{0%,100%{transform:translate(0,0);}50%{transform:translate(4px,-4px);}}
.hw-arrow{animation:hw-arrow 2.4s ease-in-out infinite;}

/* ── ADS ── */
.ads-section{background:var(--navy);padding:110px 32px;}
.ads-inner{max-width:1180px;margin:0 auto;}
.ads-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.ads-eyebrow::before{content:'';display:block;width:20px;height:1.5px;background:var(--blue);}
.ads-title{font-size:clamp(30px,3.8vw,50px);font-weight:600;color:#fff;margin-bottom:20px;letter-spacing:-0.02em;}
.ads-sub{font-size:16px;color:rgba(255,255,255,0.55);max-width:460px;line-height:1.8;margin-bottom:56px;}
.ads-carousel{position:relative;margin-top:8px;}
.ads-track-wrap{overflow:hidden;margin:0 -8px;}
.ads-track{display:flex;gap:20px;padding:8px;transition:transform .5s cubic-bezier(.22,.61,.36,1);will-change:transform;}
.ad-slide{flex:0 0 calc((100% - 60px) / 4);aspect-ratio:4/5;border-radius:14px;overflow:hidden;position:relative;background:#0a1530;box-shadow:0 4px 24px rgba(0,0,0,0.25);}
.ad-slide img{width:100%;height:100%;object-fit:cover;display:block;}
.ad-slide .wistia_responsive_padding,.ad-slide .wistia_responsive_wrapper,.ad-slide iframe{position:absolute!important;inset:0!important;width:100%!important;height:100%!important;padding:0!important;}
.ad-slide-badge{position:absolute;top:14px;left:14px;background:rgba(10,20,40,0.72);backdrop-filter:blur(6px);color:#fff;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:6px 10px;border-radius:999px;z-index:2;display:flex;align-items:center;gap:6px;pointer-events:none;}
.ad-slide-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);}
.ad-slide-badge.video .ad-slide-badge-dot{background:#ef4444;}
.ads-nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:16px;}
.ads-dots{display:flex;gap:8px;}
.ads-dot{width:22px;height:3px;border-radius:2px;background:rgba(255,255,255,0.18);border:none;padding:0;cursor:pointer;transition:background .2s;}
.ads-dot.active{background:var(--blue);}
.ads-arrows{display:flex;gap:10px;}
.ads-arrow{width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,0.18);background:transparent;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,border-color .2s;}
.ads-arrow:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4);}
.ads-arrow:disabled{opacity:0.35;cursor:not-allowed;}
.ad-card:hover .ad-card-bg{filter:brightness(1.1);}
.ad-card-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.6);margin-bottom:8px;}
.ad-card-title{font-size:14px;font-weight:600;color:#fff;line-height:1.35;font-family:'Playfair Display',serif;}
.ad-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:all .2s;}
.ad-card:hover .ad-play{background:rgba(255,255,255,0.25);}

/* ── WHY ── */
.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:72px;border:1px solid var(--border);}
.why-card{padding:40px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);transition:background .2s;}
.why-card:hover{background:var(--white);}
.why-card:nth-child(even){border-right:none;}
.why-card:nth-last-child(-n+2){border-bottom:none;}
.why-num{font-family:'Playfair Display',serif;font-size:13px;color:var(--ink-muted);margin-bottom:20px;letter-spacing:0.06em;}
.why-title{font-size:19px;font-weight:600;color:var(--ink);margin-bottom:10px;font-family:'Playfair Display',serif;}
.why-desc{font-size:14px;color:var(--ink-muted);line-height:1.75;}

/* ── GUARANTEE ── */
.guarantee{background:var(--cream-mid);padding:110px 32px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.guarantee-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:96px;align-items:center;}
.guarantee-left{border-right:1px solid var(--border);padding-right:96px;}
.guarantee-number{font-family:'Playfair Display',serif;font-size:clamp(80px,12vw,148px);font-weight:700;color:var(--navy);line-height:1;letter-spacing:-0.04em;margin-bottom:-8px;}
.guarantee-word{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,38px);font-style:italic;color:var(--ink-muted);margin-bottom:4px;}
.guarantee-word2{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,38px);color:var(--ink-muted);margin-bottom:0;}
.guarantee-title{font-size:clamp(26px,3vw,40px);font-weight:600;margin-bottom:18px;letter-spacing:-0.02em;}
.guarantee-desc{font-size:16px;color:var(--ink-muted);margin-bottom:32px;line-height:1.8;}
.guarantee-list{list-style:none;margin-bottom:36px;}
.guarantee-list li{display:flex;align-items:flex-start;gap:12px;font-size:15px;color:var(--ink-mid);padding:10px 0;border-bottom:1px solid var(--border);}
.guarantee-list li:first-child{border-top:1px solid var(--border);}
.g-dash{color:var(--blue);font-weight:700;flex-shrink:0;margin-top:2px;}

/* ── TESTIMONIALS ── */
.testi-section{padding:110px 32px;background:var(--white);}
.testi-video-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px;margin-top:72px;max-width:1100px;margin-left:auto;margin-right:auto;}
.testi-video-card{display:flex;flex-direction:column;}
.testi-video-wrap{position:relative;width:100%;aspect-ratio:9/16;border-radius:14px;overflow:hidden;background:var(--cream-mid);border:1px solid var(--border);box-shadow:0 1px 2px rgba(20,30,48,0.04);}
.testi-video-wrap .wistia_responsive_padding,.testi-video-wrap .wistia_responsive_wrapper,.testi-video-wrap .wistia_embed{width:100%!important;height:100%!important;position:absolute!important;inset:0!important;padding:0!important;}
.testi-video-meta{padding:18px 4px 0;}
.testi-video-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35;}
.testi-video-role{font-size:12px;color:var(--ink-muted);margin-top:4px;line-height:1.5;}
.testi-video-stars{color:var(--gold);font-size:11px;letter-spacing:2px;margin-top:10px;}
@media (max-width:900px){.testi-video-grid{grid-template-columns:repeat(2,1fr);gap:24px;max-width:520px;}}
@media (max-width:480px){.testi-video-grid{grid-template-columns:1fr;max-width:280px;gap:32px;}}

/* ── FAQ ── */
.faq-section{padding:110px 32px;}
.faq-inner{max-width:800px;margin:0 auto;}
.faq-list{margin-top:56px;}
.faq-item{border-bottom:1px solid var(--border);}
.faq-item:first-child{border-top:1px solid var(--border);}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:24px 0;cursor:pointer;gap:24px;}
.faq-q-text{font-size:16px;font-weight:500;color:var(--ink);font-family:'Playfair Display',serif;transition:color .2s;}
.faq-item.open .faq-q-text{color:var(--navy);}
.faq-q:hover .faq-q-text{color:var(--navy);}
.faq-icon{flex-shrink:0;transition:transform .25s;color:var(--ink-muted);}
.faq-item.open .faq-icon{transform:rotate(45deg);}
.faq-a{font-size:15px;color:var(--ink-muted);line-height:1.8;padding-bottom:24px;display:none;}
.faq-item.open .faq-a{display:block;}

/* ── CTA BANNER ── */
.cta-banner{background:var(--navy);padding:120px 32px;text-align:center;position:relative;overflow:hidden;}
.cta-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(59,130,246,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(255,200,80,0.06) 0%,transparent 60%);}
.cta-inner{max-width:640px;margin:0 auto;position:relative;}
.cta-tag{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:10px;}
.cta-tag::before,.cta-tag::after{content:'';display:block;width:28px;height:1px;background:var(--blue);}
.cta-banner h2{font-size:clamp(32px,5vw,58px);color:#fff;margin-bottom:20px;letter-spacing:-0.025em;}
.cta-banner h2 em{font-style:italic;opacity:0.7;}
.cta-banner p{font-size:17px;color:rgba(255,255,255,0.6);margin-bottom:44px;line-height:1.8;}
.cta-banner-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}

function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
    }, {threshold: 0.1});
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

      if(!start) start = ts;
      const p = Math.min((ts-start)/dur, 1);
      const eased = 1 - Math.pow(1-p, 3);
      setCount(Math.floor(eased * target));
      if(p < 1) frame = requestAnimationFrame(go);
    };
    const t = setTimeout(() => { frame = requestAnimationFrame(go); }, 400);
    return () => { clearTimeout(t); cancelAnimationFrame(frame); };
  }, []);

  const tickerItems = [

        <rect className="stroke hw-node hw-node-d" x="77" y="73" width="10" height="10" rx="1.5"/>

          <circle className="stroke" cx="50" cy="50" r="14"/>
          <circle className="fill" cx="50" cy="50" r="14" opacity="0.08"/>
          {/* lock/checkmark inside = territory locked */}
          <path className="stroke hw-lock" d="M45 50 L49 54 L56 46"/>
        </g>
      </g>);
    case 'radar':
      return wrap(<g>
        <circle className="stroke hw-ring" cx="50" cy="50" r="44"/>
        <circle className="stroke hw-ring" cx="50" cy="50" r="44"/>
        <circle className="stroke hw-ring" cx="50" cy="50" r="44"/>

function AdsShowcase() {

  const [idx, setIdx] = useState(0);

      if (w <= 640) setPerView(1);

    update();
    window.addEventListener('resize', update);

  const maxIdx = Math.max(0, slides.length - perView);
  const clamped = Math.min(idx, maxIdx);

  return (

function TweaksPanel({tweaks, setTweaks, visible}) {
  if(!visible) return null;
  const update = (k,v) => {
    const next = {...tweaks, [k]: v};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: next}, '*');
  };
  const fieldStyle = {width:'100%',padding:'8px 10px',border:'1px solid var(--border)',borderRadius:6,fontSize:13,fontFamily:'DM Sans,sans-serif',background:'var(--cream)',color:'var(--ink)',resize:'none'};
  const labelStyle = {fontSize:11,fontWeight:600,color:'var(--ink-muted)',marginBottom:6,display:'block',textTransform:'uppercase',letterSpacing:'0.08em'};
  return (
    <div style={{position:'fixed',bottom:24,right:24,background:'var(--white)',borderRadius:12,boxShadow:'0 8px 40px rgba(28,24,20,0.12)',padding:24,width:300,zIndex:9999,border:'1px solid var(--border)',fontFamily:'DM Sans,sans-serif'}}>
      <div style={{fontSize:12,fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>Tweaks</div>
      <div style={{marginBottom:14}}>
        <label style={labelStyle}>Headline</label>
        <textarea value={tweaks.headline} onChange={e=>update('headline',e.target.value)} rows={2} style={fieldStyle} />
      </div>
      <div style={{marginBottom:14}}>
        <label style={labelStyle}>CTA Text</label>
        <input value={tweaks.ctaText} onChange={e=>update('ctaText',e.target.value)} style={fieldStyle} />
      </div>
      <div style={{marginBottom:14}}>
        <label style={labelStyle}>Guarantee (days)</label>
        <input type="number" value={tweaks.guaranteeDays} onChange={e=>update('guaranteeDays',e.target.value)} style={fieldStyle} />
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:14,borderTop:'1px solid var(--border)'}}>
        <label style={{...labelStyle,margin:0}}>Show partner logos</label>
        <input type="checkbox" checked={tweaks.showTrustLogos} onChange={e=>update('showTrustLogos',e.target.checked)} style={{width:16,height:16,accentColor:'var(--navy)'}} />
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  useReveal();
  useEffect(() => {
    const h = e => {
      if(e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  return (
    <>
      <Nav tweaks={tweaks} />
      <Hero tweaks={tweaks} />
      <Trust tweaks={tweaks} />
      <HowItWorks />
      <AdsShowcase />
      <WhyItWorks />
      <Guarantee tweaks={tweaks} />
      <Testimonials />
      <FAQ />
      <CTABanner tweaks={tweaks} />
      <Footer />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
