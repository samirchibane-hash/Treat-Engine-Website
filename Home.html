<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treat Engine — The Complete Growth System for Water Treatment Dealers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#faf7f2;
  --cream-mid:#f0ebe0;
  --cream-dark:#e5ddd0;
  --ink:#1c1814;
  --ink-mid:#3d3530;
  --ink-muted:#7a6f65;
  --navy:#1a2744;
  --navy-light:#243460;
  --blue:#3b82f6;
  --blue-light:#eff6ff;
  --blue-dark:#1d4ed8;
  --gold:oklch(0.72 0.10 72);
  --gold-dark:oklch(0.58 0.12 68);
  --white:#fffefb;
  --border:rgba(28,24,20,0.10);
  --border-mid:rgba(28,24,20,0.06);
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.12;}
p{line-height:1.75;}
a{text-decoration:none;color:inherit;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,247,242,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);transition:box-shadow .3s;}
.nav.scrolled{box-shadow:0 2px 24px rgba(28,24,20,0.07);}
.nav-inner{max-width:1180px;margin:0 auto;padding:0 32px;height:70px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo img{height:34px;width:auto;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--ink-muted);padding:7px 14px;border-radius:6px;transition:all .2s;letter-spacing:.01em;}
.nav-links a:hover{color:var(--ink);background:var(--cream-mid);}
.nav-links a.active{color:var(--blue);font-weight:600;background:var(--blue-light);}
.nav-cta{background:var(--blue);color:#fff;border:none;padding:11px 22px;border-radius:6px;font-size:13.5px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:background .2s,transform .15s;font-family:'DM Sans',sans-serif;}
.nav-cta:hover{background:var(--blue-dark);transform:translateY(-1px);}
@media(max-width:900px){.nav-links{display:none;}}

/* HERO */
.hero-section{padding:140px 32px 0;max-width:1180px;margin:0 auto;}
.hero-eyebrow{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:28px;}
.hero-eyebrow-line{width:20px;height:1.5px;background:var(--blue);}
.hero-headline{font-size:clamp(52px,7vw,90px);font-weight:600;color:var(--ink);letter-spacing:-.03em;line-height:1.02;margin-bottom:36px;}
.hero-headline em{font-style:italic;color:var(--navy);}
.hero-body{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:end;padding-bottom:80px;border-bottom:1px solid var(--border);}
.hero-left{}
.hero-sub{font-size:18px;color:var(--ink-muted);max-width:520px;line-height:1.8;margin-bottom:40px;}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.btn-blue{background:var(--blue);color:#fff;border:none;padding:15px 30px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;letter-spacing:.01em;}
.btn-blue:hover{background:var(--blue-dark);transform:translateY(-2px);}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border);padding:14px 24px;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-outline:hover{border-color:var(--ink-muted);}
.hero-right{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);}
.hero-service-row{display:flex;align-items:center;gap:20px;padding:22px 28px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;text-decoration:none;}
.hero-service-row:last-child{border-bottom:none;}
.hero-service-row:hover{background:var(--white);}
.hero-service-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
.hero-service-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:2px;}
.hero-service-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--ink);}
.hero-service-desc{font-size:13px;color:var(--ink-muted);margin-top:1px;}
.hero-service-arrow{margin-left:auto;color:var(--ink-muted);flex-shrink:0;transition:transform .2s;}
.hero-service-row:hover .hero-service-arrow{transform:translateX(3px);color:var(--blue);}

@media(max-width:960px){
  .hero-body{grid-template-columns:1fr!important;gap:48px;}
  .hero-section{padding:100px 20px 0!important;}
  .hero-right{width:100%;}
}

/* TICKER */
.ticker{padding:22px 0;overflow:hidden;white-space:nowrap;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.ticker-inner{display:inline-flex;animation:tick 36s linear infinite;}
@keyframes tick{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.ticker-item{display:inline-flex;align-items:center;gap:12px;padding:0 32px;font-size:13px;color:var(--ink-muted);font-weight:500;}
.ticker-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0;}

/* STATS */
.stats-section{background:var(--navy);padding:80px 32px;}
.stats-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid rgba(255,255,255,0.08);}
.stat-cell{padding:48px 40px;border-right:1px solid rgba(255,255,255,0.08);text-align:left;}
.stat-cell:last-child{border-right:none;}
.stat-num{font-family:'Playfair Display',serif;font-size:clamp(40px,5vw,60px);font-weight:700;color:#fff;line-height:1;letter-spacing:-.03em;}
.stat-num span{color:var(--blue);font-style:italic;}
.stat-label{font-size:14px;color:rgba(255,255,255,0.5);margin-top:8px;line-height:1.5;}

/* SYSTEM SECTION */
.system-section{padding:120px 32px;}
.system-inner{max-width:1180px;margin:0 auto;}
.system-header{margin-bottom:80px;padding-bottom:64px;border-bottom:1px solid var(--border);}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';display:block;width:20px;height:1.5px;background:var(--blue);}
.section-title{font-size:clamp(30px,3.8vw,50px);font-weight:600;color:var(--ink);margin-bottom:20px;letter-spacing:-.02em;}
.section-sub{font-size:16.5px;color:var(--ink-muted);line-height:1.8;}

/* Stacked service cards */
.system-steps{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);}
.sys-step{
  display:grid;
  grid-template-columns:1fr 1fr;
  border-bottom:1px solid var(--border);
  overflow:hidden;
  opacity:0;
  transform:translateY(32px);
  transition:opacity .65s cubic-bezier(.22,1,.36,1), transform .65s cubic-bezier(.22,1,.36,1);
}
.sys-step:last-child{border-bottom:none;}
.sys-step.step-visible{opacity:1;transform:none;}
.sys-step-top{
  padding:52px 56px;
  border-right:1px solid var(--border);
  position:relative;
  overflow:hidden;
  background:var(--white);
  transition:background .3s;
}
.sys-step:hover .sys-step-top{background:var(--cream-mid);}
/* accent bar that animates in */
.sys-step-top::before{
  content:'';
  position:absolute;
  top:0;left:0;
  width:3px;height:0;
  background:var(--blue);
  transition:height .5s cubic-bezier(.22,1,.36,1);
}
.sys-step.step-visible .sys-step-top::before{height:100%;}
.sys-step-num{
  font-family:'Playfair Display',serif;
  font-size:72px;
  font-weight:700;
  color:var(--cream-dark);
  line-height:1;
  letter-spacing:-.04em;
  margin-bottom:20px;
  transition:color .3s;
}
.sys-step:hover .sys-step-num{color:var(--blue-light);}

/* Graphic animation area */
.step-graphic{
  width:100%;
  height:160px;
  margin-bottom:32px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--navy);
  overflow:hidden;
  position:relative;
}
.step-graphic svg{width:100%;height:100%;}

/* SVG path draw animations */
@keyframes drawPath{from{stroke-dashoffset:1}to{stroke-dashoffset:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes rise{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes flowDot{0%{transform:translateX(-20px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateX(200px);opacity:0}}
@keyframes scanLine{0%{transform:translateY(0)}100%{transform:translateY(120px)}}
@keyframes checkDraw{from{stroke-dashoffset:1}to{stroke-dashoffset:0}}
@keyframes signatureDraw{from{stroke-dashoffset:1}to{stroke-dashoffset:0}}

/* Website graphic */
.gfx-website .gfx-frame{stroke-dasharray:1;stroke-dashoffset:1;}
.step-visible .gfx-website .gfx-frame{animation:drawPath .6s cubic-bezier(.22,1,.36,1) .3s forwards;}
.gfx-website .gfx-bar{opacity:0;}
.step-visible .gfx-website .gfx-bar:nth-child(1){animation:fadeUp .4s ease .8s forwards;}
.step-visible .gfx-website .gfx-bar:nth-child(2){animation:fadeUp .4s ease .95s forwards;}
.step-visible .gfx-website .gfx-bar:nth-child(3){animation:fadeUp .4s ease 1.1s forwards;}
.gfx-website .gfx-scan{animation:scanLine 2.5s linear infinite;opacity:.12;}
.step-visible .gfx-website .gfx-cursor{animation:blink 1s step-end 1.2s infinite;}

/* Leads graphic */
.gfx-leads .gfx-dot{opacity:0;}
.step-visible .gfx-leads .gfx-dot:nth-child(1){animation:flowDot 1.8s ease .4s infinite;}
.step-visible .gfx-leads .gfx-dot:nth-child(2){animation:flowDot 1.8s ease .9s infinite;}
.step-visible .gfx-leads .gfx-dot:nth-child(3){animation:flowDot 1.8s ease 1.4s infinite;}
.gfx-leads .gfx-calendar{stroke-dasharray:1;stroke-dashoffset:1;opacity:0;}
.step-visible .gfx-leads .gfx-calendar{animation:drawPath .7s ease .3s forwards;}
.gfx-leads .gfx-pip{opacity:0;}
.step-visible .gfx-leads .gfx-pip:nth-child(1){animation:fadeUp .3s ease 1s forwards;}
.step-visible .gfx-leads .gfx-pip:nth-child(2){animation:fadeUp .3s ease 1.2s forwards;}
.step-visible .gfx-leads .gfx-pip:nth-child(3){animation:fadeUp .3s ease 1.4s forwards;}
.step-visible .gfx-leads .gfx-pip:nth-child(4){animation:fadeUp .3s ease 1.6s forwards;}

/* Sales graphic */
.gfx-sales .gfx-col{transform-origin:bottom;transform:scaleY(0);}
.step-visible .gfx-sales .gfx-col:nth-child(1){animation:rise .5s cubic-bezier(.22,1,.36,1) .4s forwards;}
.step-visible .gfx-sales .gfx-col:nth-child(2){animation:rise .5s cubic-bezier(.22,1,.36,1) .55s forwards;}
.step-visible .gfx-sales .gfx-col:nth-child(3){animation:rise .5s cubic-bezier(.22,1,.36,1) .7s forwards;}
.step-visible .gfx-sales .gfx-col:nth-child(4){animation:rise .5s cubic-bezier(.22,1,.36,1) .85s forwards;}
.gfx-sales .gfx-sig{stroke-dasharray:1;stroke-dashoffset:1;}
.step-visible .gfx-sales .gfx-sig{animation:signatureDraw .8s cubic-bezier(.22,1,.36,1) 1.2s forwards;}
.gfx-sales .gfx-check{stroke-dasharray:1;stroke-dashoffset:1;opacity:0;}
.step-visible .gfx-sales .gfx-check{animation:drawPath .4s ease 1.8s forwards;opacity:1;}

@media(max-width:960px){
  .step-graphic{height:120px;}
}
.sys-step-stage{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);margin-bottom:10px;}
.sys-step-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:600;color:var(--ink);margin-bottom:10px;letter-spacing:-.02em;}
.sys-step-sub{font-size:15px;color:var(--ink-muted);line-height:1.75;max-width:380px;}
.sys-step-body{
  padding:52px 56px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.sys-step-list{list-style:none;display:flex;flex-direction:column;gap:0;}
.sys-step-list li{
  display:flex;align-items:flex-start;gap:14px;
  font-size:14.5px;color:var(--ink-mid);
  padding:14px 0;
  border-bottom:1px solid var(--border-mid);
  opacity:0;
  transform:translateX(-12px);
  transition:opacity .4s ease, transform .4s ease;
}
.sys-step-list li:last-child{border-bottom:none;}
.sys-step.step-visible .sys-step-list li{opacity:1;transform:none;}
.sys-step.step-visible .sys-step-list li:nth-child(1){transition-delay:.18s;}
.sys-step.step-visible .sys-step-list li:nth-child(2){transition-delay:.28s;}
.sys-step.step-visible .sys-step-list li:nth-child(3){transition-delay:.38s;}
.sys-step.step-visible .sys-step-list li:nth-child(4){transition-delay:.48s;}
.sys-step-check{
  width:20px;height:20px;border-radius:50%;
  background:var(--blue-light);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.sys-step-check svg{color:var(--blue);}
.sys-step-link{
  display:inline-flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--blue);
  margin-top:28px;
  padding:12px 20px;
  border:1.5px solid var(--blue);
  border-radius:6px;
  align-self:flex-start;
  transition:background .2s, color .2s, transform .2s;
}
.sys-step-link:hover{background:var(--blue);color:#fff;transform:translateX(2px);}
.sys-step-link svg{transition:transform .2s;}
.sys-step-link:hover svg{transform:translateX(3px);}

/* Service-specific primary CTA block */
.sys-step-cta{
  display:inline-flex;flex-direction:column;align-items:flex-start;gap:4px;
  margin-top:32px;align-self:flex-start;
  padding:14px 22px 12px;
  background:var(--ink);color:#fff;
  border:1.5px solid var(--ink);
  border-radius:8px;
  text-decoration:none;
  transition:background .25s ease, border-color .25s ease, transform .25s ease, box-shadow .25s ease;
  box-shadow:0 1px 0 rgba(0,0,0,0.04);
  position:relative;overflow:hidden;
}
.sys-step-cta::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(100deg, transparent 0%, transparent 45%, rgba(59,130,246,0.22) 50%, transparent 55%, transparent 100%);
  transform:translateX(-120%);
  transition:transform .7s ease;
  pointer-events:none;
}
.sys-step-cta:hover{background:var(--blue);border-color:var(--blue);transform:translateY(-1px);box-shadow:0 12px 28px -12px rgba(59,130,246,0.55);}
.sys-step-cta:hover::before{transform:translateX(120%);}
.sys-step-cta-main{
  display:inline-flex;align-items:center;gap:10px;
  font-size:14.5px;font-weight:600;letter-spacing:-0.005em;line-height:1;
}
.sys-step-cta-main svg{transition:transform .25s ease;flex-shrink:0;}
.sys-step-cta:hover .sys-step-cta-main svg{transform:translateX(4px);}
.sys-step-cta-sub{
  font-size:11px;font-weight:500;letter-spacing:.04em;
  color:rgba(255,255,255,0.55);
  text-transform:uppercase;
  transition:color .25s ease;
}
.sys-step-cta:hover .sys-step-cta-sub{color:rgba(255,255,255,0.85);}

@media(max-width:960px){
  .sys-step{grid-template-columns:1fr;}
  .sys-step-top{border-right:none;border-bottom:1px solid var(--border);}
  .sys-step-num{font-size:48px;}
  .sys-step-top,.sys-step-body{padding:36px 32px;}
}

/* ABOUT */
.about-section{background:var(--white);padding:120px 32px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.about-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:96px;align-items:start;}
.about-left{}
.about-big{font-family:'Playfair Display',serif;font-size:clamp(48px,7.5vw,96px);font-weight:700;color:var(--navy);line-height:.95;letter-spacing:-.035em;margin-bottom:10px;}
.about-big-sub{font-family:'Playfair Display',serif;font-size:clamp(20px,3vw,32px);font-style:italic;color:var(--ink-muted);}
.about-right{}
.about-title{font-size:clamp(26px,3vw,40px);font-weight:600;margin-bottom:20px;letter-spacing:-.02em;}
.about-desc{font-size:16px;color:var(--ink-muted);line-height:1.85;margin-bottom:24px;}
.about-pillars{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:40px;border:1px solid var(--border);}
.about-pillar{padding:24px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.about-pillar:nth-child(even){border-right:none;}
.about-pillar:nth-last-child(-n+2){border-bottom:none;}
.about-pillar-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;font-family:'Playfair Display',serif;}
.about-pillar-desc{font-size:13px;color:var(--ink-muted);line-height:1.65;}

/* TESTIMONIALS */
.testi-section{padding:120px 32px;}
.testi-inner{max-width:1180px;margin:0 auto;}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:64px;border:1px solid var(--border);}
.testi-card{padding:44px;border-right:1px solid var(--border);transition:background .2s;}
.testi-card:last-child{border-right:none;}
.testi-card:hover{background:var(--white);}
.testi-service-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);background:var(--blue-light);padding:4px 10px;border-radius:4px;display:inline-block;margin-bottom:18px;}
.testi-quote{font-family:'Playfair Display',serif;font-size:16.5px;font-style:italic;color:var(--ink);line-height:1.65;margin-bottom:28px;}
.testi-quote::before{content:'\201C';font-size:48px;color:var(--cream-dark);display:block;line-height:.8;margin-bottom:14px;font-style:normal;}
.testi-author{display:flex;align-items:center;gap:12px;padding-top:24px;border-top:1px solid var(--border);}
.testi-avatar{width:40px;height:40px;border-radius:50%;background:var(--cream-mid);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:14px;border:1px solid var(--border);flex-shrink:0;}
.testi-name{font-size:14px;font-weight:600;}
.testi-role{font-size:12px;color:var(--ink-muted);margin-top:2px;}
/* VIDEO TESTIMONIALS */
.testi-video-section{padding:110px 32px;background:var(--white);}
.testi-video-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px;margin-top:72px;max-width:1100px;margin-left:auto;margin-right:auto;}
.testi-video-card{display:flex;flex-direction:column;}
.testi-video-wrap{position:relative;width:100%;aspect-ratio:9/16;border-radius:14px;overflow:hidden;background:var(--cream-mid);border:1px solid var(--border);box-shadow:0 1px 2px rgba(20,30,48,0.04);}
.testi-video-wrap iframe{width:100%!important;height:100%!important;position:absolute!important;inset:0!important;border:0;}
.testi-video-meta{padding:18px 4px 0;}
.testi-video-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35;}
.testi-video-role{font-size:12px;color:var(--ink-muted);margin-top:4px;line-height:1.5;}
.testi-video-stars{color:var(--gold);font-size:11px;letter-spacing:2px;margin-top:10px;}

/* TRUST */
.trust-section{background:var(--cream-mid);padding:64px 32px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.trust-inner{max-width:1180px;margin:0 auto;}
.trust-label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:24px;}
.trust-logos{display:flex;align-items:center;justify-content:space-between;gap:28px;flex-wrap:nowrap;width:100%;}
.trust-logo{display:flex;align-items:center;justify-content:center;height:32px;flex:0 1 auto;min-width:0;filter:grayscale(100%);opacity:0.45;transition:opacity .25s ease, filter .25s ease;}
.trust-logo img{max-height:100%;max-width:100%;width:auto;height:auto;display:block;object-fit:contain;}
.trust-logo:hover{opacity:1;filter:grayscale(0%);}
.trust-logo.is-circle{height:40px;}
@media (max-width: 900px){
  .trust-logos{flex-wrap:wrap;justify-content:center;gap:24px 32px;}
  .trust-logo{height:28px;}
  .trust-logo.is-circle{height:36px;}
}

/* CTA */
.cta-section{background:var(--navy);padding:140px 32px;overflow:hidden;position:relative;}
.cta-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,0.14) 0%,transparent 60%);}
.cta-inner{max-width:760px;margin:0 auto;text-align:center;position:relative;}
.cta-eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:28px;}
.cta-eyebrow::before,.cta-eyebrow::after{content:'';width:24px;height:1px;background:rgba(255,255,255,0.25);}
.cta-headline{font-size:clamp(38px,5.2vw,64px);color:#fff;letter-spacing:-.025em;margin-bottom:22px;line-height:1.05;}
.cta-headline em{font-style:italic;color:var(--blue);opacity:.95;font-weight:500;}
.cta-sub{font-size:17px;color:rgba(255,255,255,0.65);line-height:1.75;margin:0 auto 40px;max-width:560px;}
.cta-actions{display:inline-flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:40px;}
.btn-cream{background:var(--cream);color:var(--navy);border:none;padding:16px 32px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-cream:hover{background:#fff;transform:translateY(-2px);}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.85);border:1.5px solid rgba(255,255,255,0.25);padding:15px 28px;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-ghost:hover{border-color:rgba(255,255,255,0.6);color:#fff;}
.cta-meta{display:inline-flex;align-items:center;gap:20px;font-size:12.5px;color:rgba(255,255,255,0.45);letter-spacing:.02em;padding-top:28px;border-top:1px solid rgba(255,255,255,0.1);flex-wrap:wrap;justify-content:center;}
.cta-meta-item{display:inline-flex;align-items:center;gap:8px;}
.cta-meta-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);}

/* FOOTER */
.footer{background:var(--ink);padding:72px 32px 40px;}
.footer-inner{max-width:1180px;margin:0 auto;}
.footer-top{display:grid;grid-template-columns:1.6fr 1fr 1.2fr;gap:56px;padding-bottom:56px;border-bottom:1px solid rgba(255,255,255,0.08);}
.footer-brand p{font-size:13.5px;color:rgba(255,255,255,0.4);margin-top:20px;line-height:1.75;max-width:260px;}
.footer-brand img{height:30px;}
.footer-col h4{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,0.3);margin-bottom:18px;}
.footer-col a{display:block;font-size:14px;color:rgba(255,255,255,0.55);margin-bottom:11px;transition:color .2s;}
.footer-col a:hover{color:#fff;}
.footer-bottom{padding-top:28px;display:flex;align-items:center;justify-content:space-between;}
.footer-copy{font-size:13px;color:rgba(255,255,255,0.25);}

/* Scroll reveal */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:none;}

@media(max-width:960px){
  .hero-body{grid-template-columns:1fr!important;gap:40px;}
  .hero-section{padding:100px 20px 0!important;}
  .stats-inner{grid-template-columns:1fr 1fr;}
  .stat-cell:nth-child(2){border-right:none;}
  .stat-cell:nth-child(3){border-top:1px solid rgba(255,255,255,0.08);}
  .system-steps{grid-template-columns:1fr;}
  .sys-step{border-right:none;border-bottom:1px solid var(--border);}
  .sys-step-top{border-right:none;border-bottom:1px solid var(--border);}
  .about-inner{grid-template-columns:1fr;}

  .testi-card{border-right:none;border-bottom:1px solid var(--border);}
  .testi-video-grid{grid-template-columns:repeat(2,1fr);gap:24px;max-width:520px;}

  .nav-links{display:none;}
  .hero-section{padding:100px 20px 0;}

  .system-section,.about-section,.testi-section,.cta-section{padding:72px 20px;}

  .footer-top{gap:32px;}
  .ticker{display:none;}
}

  .footer-top{grid-template-columns:1fr;}
  .hero-actions{flex-direction:column;align-items:stretch;}

  .sys-step{grid-template-columns:1fr;}
  .sys-step-top,.sys-step-body{padding:28px 24px;}
  .system-header .section-title,.about-title{font-size:28px;}
  .topbar-inner{gap:10px;}
}

<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
    }, {threshold: 0.08});
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function Nav({tweaks}) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const ctaLabel = (tweaks && tweaks.ctaText) ? tweaks.ctaText : 'Book a Demo';
  return (
    <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
      <div className="nav-inner">
        <a href="/home"><img src="uploads/Treat Engine Logo .png" alt="Treat Engine" style={{height:34}}/></a>
        <div className="nav-links">
          <a href="/home" className="active">Home</a>
          <a href="/websites">Water Websites</a>
          <a href="/">Water Leads</a>
          <a href="/sales">Water Sales</a>
        </div>
      </div>
    </nav>
  );
}
