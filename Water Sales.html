<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Sales — ClearDeals by Treat Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#faf7f2;
  --cream-mid:#f0ebe0;
  --cream-dark:#e5ddd0;
  --ink:#1c1814;
  --ink-mid:#3d3530;
  --ink-muted:#7a6f65;
  --navy:#1a2744;
  --navy-light:#243460;
  --gold:oklch(0.72 0.10 72);
  --gold-dark:oklch(0.58 0.12 68);
  --blue:#3b82f6;
  --blue-light:#eff6ff;
  --blue-dark:#1d4ed8;
  --white:#fffefb;
  --border:rgba(28,24,20,0.10);
  --border-mid:rgba(28,24,20,0.06);
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.12;}
p{line-height:1.75;}
a{text-decoration:none;color:inherit;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,247,242,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);transition:box-shadow .3s;}
.nav.scrolled{box-shadow:0 2px 24px rgba(28,24,20,0.07);}
.nav-inner{max-width:1180px;margin:0 auto;padding:0 32px;height:70px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo img{height:34px;width:auto;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--ink-muted);padding:7px 14px;border-radius:6px;transition:all .2s;letter-spacing:.01em;}
.nav-links a:hover{color:var(--ink);background:var(--cream-mid);}
.nav-links a.active{color:var(--blue);font-weight:600;background:var(--blue-light);}
.nav-cta{background:var(--blue);color:#fff;border:none;padding:11px 22px;border-radius:6px;font-size:13.5px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:background .2s,transform .15s;font-family:'DM Sans',sans-serif;}
.nav-cta:hover{background:var(--blue-dark);transform:translateY(-1px);}
@media(max-width:900px){.nav-links{display:none;}}

/* HERO */
.hero{padding:120px 32px 0;max-width:1280px;margin:0 auto;}
.hero-top{display:grid;grid-template-columns:1.05fr 1.15fr;gap:64px;align-items:center;padding:40px 0 72px;}
.hero-left{position:relative;z-index:2;}
.service-badge{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;padding:7px 16px;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:28px;}
.service-badge-dot{width:6px;height:6px;border-radius:50%;background:#fff;}
.hero h1{font-size:clamp(42px,5vw,72px);font-weight:600;color:var(--ink);margin-bottom:28px;letter-spacing:-.028em;line-height:1.04;}
.hero h1 em{font-style:italic;color:var(--navy);}
.hero-sub{font-size:17.5px;color:var(--ink-muted);max-width:520px;margin-bottom:36px;line-height:1.75;}
.hero-bullets{list-style:none;display:flex;flex-direction:column;gap:12px;margin-bottom:40px;}
.hero-bullets li{display:flex;align-items:center;gap:12px;font-size:15px;color:var(--ink-mid);font-weight:500;}
.hero-bullets .hb-check{width:22px;height:22px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.hero-actions-meta{font-size:13px;color:var(--ink-muted);display:flex;align-items:center;gap:8px;margin-left:4px;}
.hero-actions-meta::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--blue);}

/* Hero image composition */
.hero-visual{position:relative;width:100%;min-height:520px;display:flex;align-items:center;justify-content:center;}
.hero-visual-img{width:100%;height:auto;display:block;position:relative;z-index:2;filter:drop-shadow(0 30px 60px rgba(28,24,20,0.18)) drop-shadow(0 8px 18px rgba(28,24,20,0.08));}
.hero-visual-glow{position:absolute;inset:-6% -4% -10% -4%;background:radial-gradient(ellipse at 55% 55%, rgba(59,130,246,0.16) 0%, rgba(59,130,246,0.04) 45%, transparent 70%);z-index:1;pointer-events:none;}
.hero-tablet-badge{position:absolute;top:2%;left:-2%;z-index:3;width:156px;height:156px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:18px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:19px;line-height:1.15;letter-spacing:-.01em;box-shadow:0 18px 40px rgba(28,24,20,0.25);transform:rotate(-6deg);}
.hero-tablet-badge sup{font-size:11px;font-weight:500;opacity:.6;margin-left:1px;}
.hero-tablet-badge::after{content:'';position:absolute;inset:6px;border-radius:50%;border:1px dashed rgba(255,255,255,0.15);}
.hero-badge-asterisk{font-size:11px;color:var(--ink-muted);margin-top:14px;padding-left:4px;font-style:italic;}

/* Stat strip */
.hero-stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-top:0;}
.hero-stats-strip .stat-cell{padding:28px 28px;border-right:1px solid var(--border);}
.hero-stats-strip .stat-cell:last-child{border-right:none;}
.hero-stats-strip .stat-num{font-family:'Playfair Display',serif;font-size:40px;font-weight:600;color:var(--navy);line-height:1;letter-spacing:-.02em;}
.hero-stats-strip .stat-label{font-size:13px;color:var(--ink-muted);margin-top:8px;line-height:1.5;}
@media(max-width:900px){
  .hero-top{grid-template-columns:1fr;gap:48px;padding:16px 0 48px;}
  .hero-visual{min-height:auto;}
  .hero-tablet-badge{width:120px;height:120px;font-size:15px;padding:14px;left:0;top:-6%;}
  .hero-stats-strip{grid-template-columns:1fr 1fr;}
  .hero-stats-strip .stat-cell:nth-child(2){border-right:none;}
  .hero-stats-strip .stat-cell:nth-child(1),.hero-stats-strip .stat-cell:nth-child(2){border-bottom:1px solid var(--border);}
}
.btn-dark{background:var(--blue);color:#fff;border:none;padding:15px 28px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.01em;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-dark:hover{background:var(--blue-dark);transform:translateY(-2px);}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border);padding:14px 24px;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-outline:hover{border-color:var(--ink-muted);}
.hero-aside{padding-bottom:8px;}
.hero-aside-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:16px;}
.hero-stat-row{padding:18px 0;border-bottom:1px solid var(--border-mid);}
.hero-stat-row:last-child{border-bottom:none;}
.hero-stat-num{font-family:'Playfair Display',serif;font-size:38px;font-weight:600;color:var(--navy);line-height:1;}
.hero-stat-label{font-size:13px;color:var(--ink-muted);margin-top:4px;}

/* Ticker */
.hero-ticker{padding:22px 0;overflow:hidden;white-space:nowrap;border-bottom:1px solid var(--border);}
.hero-ticker-inner{display:inline-flex;animation:ticker 32s linear infinite;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.hero-ticker-item{display:inline-flex;align-items:center;gap:12px;padding:0 32px;font-size:13px;color:var(--ink-muted);font-weight:500;}
.hero-ticker-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0;}

/* Tablet mockup */
.tablet-wrap{position:relative;width:100%;}
.tablet{background:var(--navy);border-radius:18px;padding:14px;box-shadow:0 32px 72px rgba(28,24,20,0.22);border:2px solid rgba(255,255,255,0.08);}
.tablet-screen{background:#fff;border-radius:10px;overflow:hidden;}
.tablet-chrome{background:var(--cream-mid);padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.tablet-dots{display:flex;gap:5px;}
.tablet-dot{width:8px;height:8px;border-radius:50%;}
.tablet-url{flex:1;background:var(--white);border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:10px;color:var(--ink-muted);text-align:center;font-family:'DM Sans',sans-serif;}
.tablet-home{padding:20px;}
.app-header{background:linear-gradient(135deg,var(--navy),var(--navy-light));border-radius:8px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.app-logo{font-family:'Playfair Display',serif;font-size:16px;color:#fff;font-weight:600;}
.app-logo span{color:var(--blue);}
.app-dealer{font-size:10px;color:rgba(255,255,255,0.5);font-family:'DM Sans',sans-serif;}
.app-section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px;font-family:'DM Sans',sans-serif;}
.app-proposal-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:7px;margin-bottom:8px;background:#fff;}
.app-proposal-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.app-proposal-title{font-size:12px;font-weight:600;color:var(--ink);font-family:'DM Sans',sans-serif;}
.app-proposal-sub{font-size:10px;color:var(--ink-muted);font-family:'DM Sans',sans-serif;}
.app-proposal-price{margin-left:auto;font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--navy);}
.app-status{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;font-family:'DM Sans',sans-serif;}
.status-signed{background:#d1fae5;color:#065f46;}
.status-pending{background:#fef3c7;color:#92400e;}
.app-bottom{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.app-metric{background:var(--cream-mid);border-radius:7px;padding:12px;text-align:center;}
.app-metric-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--navy);line-height:1;}
.app-metric-label{font-size:10px;color:var(--ink-muted);margin-top:3px;font-family:'DM Sans',sans-serif;}
.tablet-badge{position:absolute;top:-16px;right:-16px;background:var(--blue);color:var(--ink);padding:10px 16px;border-radius:8px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.15);white-space:nowrap;}

/* SHARED */
.section{padding:110px 32px;}
.section-inner{max-width:1180px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';display:block;width:20px;height:1.5px;background:var(--blue);}
.section-title{font-size:clamp(30px,3.8vw,50px);font-weight:600;color:var(--ink);margin-bottom:20px;letter-spacing:-.02em;}
.section-sub{font-size:16.5px;color:var(--ink-muted);max-width:540px;line-height:1.8;}

/* TRUST */
.trust{background:var(--white);padding:52px 32px;border-bottom:1px solid var(--border);}
.trust-inner{max-width:1180px;margin:0 auto;}
.trust-label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:24px;}
.trust-logos{display:flex;align-items:center;justify-content:space-between;gap:28px;flex-wrap:nowrap;width:100%;}
.trust-logo{display:flex;align-items:center;justify-content:center;height:32px;flex:0 1 auto;min-width:0;filter:grayscale(100%);opacity:0.45;transition:opacity .25s ease, filter .25s ease;}
.trust-logo img{max-height:100%;max-width:100%;width:auto;height:auto;display:block;object-fit:contain;}
.trust-logo:hover{opacity:1;filter:grayscale(0%);}
.trust-logo.is-circle{height:40px;}
@media (max-width: 900px){
  .trust-logos{flex-wrap:wrap;justify-content:center;gap:24px 32px;}
  .trust-logo{height:28px;}
  .trust-logo.is-circle{height:36px;}
}

/* PROBLEM — split */
.problem-section{background:var(--white);padding:110px 32px;}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:stretch;margin-top:72px;border:1px solid var(--border);}
.problem-left{padding:0;border-right:1px solid var(--border);display:flex;flex-direction:column;}
.problem-right{padding:56px;}
.problem-left-inner{padding:56px;}
.problem-photo{position:relative;margin:0;overflow:hidden;flex:1;min-height:320px;border-top:1px solid var(--border);}
.problem-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.problem-photo-caption{position:absolute;left:20px;bottom:20px;right:20px;display:flex;align-items:center;gap:10px;background:rgba(255,255,254,0.94);backdrop-filter:blur(6px);padding:10px 14px;border-radius:6px;font-size:12px;color:var(--ink-mid);font-weight:500;box-shadow:0 4px 16px rgba(28,24,20,0.12);}
.problem-photo-caption .pc-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0;box-shadow:0 0 0 3px rgba(59,130,246,0.18);}
.problem-stat{font-family:'Playfair Display',serif;font-size:clamp(56px,8vw,96px);font-weight:700;color:var(--navy);line-height:1;letter-spacing:-.04em;margin-bottom:4px;}
.problem-stat-label{font-size:15px;color:var(--ink-muted);max-width:280px;line-height:1.7;}
.problem-list{list-style:none;margin-top:32px;display:flex;flex-direction:column;gap:0;}
.problem-list li{display:flex;align-items:flex-start;gap:14px;padding:18px 0;border-bottom:1px solid var(--border);font-size:15px;color:var(--ink-mid);line-height:1.6;}
.problem-list li:last-child{border-bottom:none;}
.problem-dash{color:var(--blue);font-weight:700;flex-shrink:0;margin-top:2px;font-size:18px;}

/* FEATURES */
.features-section{padding:110px 32px;}
.features-header{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:end;margin-bottom:72px;padding-bottom:56px;border-bottom:1px solid var(--border);}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--border);}
.feat-card{padding:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .2s;cursor:default;position:relative;overflow:hidden;}
.feat-card:hover{background:var(--white);}
.feat-card:nth-child(3n){border-right:none;}
.feat-card:nth-last-child(-n+3){border-bottom:none;}
.feat-body{padding:28px 36px 36px;}
.feat-graphic{height:180px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border-mid);background:linear-gradient(180deg, transparent 0%, rgba(28,24,20,0.012) 100%);overflow:hidden;}
.feat-graphic svg{display:block;height:100%;width:auto;max-width:100%;}
.feat-card:hover .feat-graphic{background:linear-gradient(180deg, rgba(59,130,246,0.025) 0%, rgba(59,130,246,0.01) 100%);}

/* shared graphic animations */
@keyframes fg-draw{from{stroke-dashoffset:var(--len,200);}to{stroke-dashoffset:0;}}
@keyframes fg-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes fg-pulse{0%,100%{opacity:.35;transform:scale(1);}50%{opacity:.9;transform:scale(1.08);}}
@keyframes fg-fadein{0%{opacity:0;}100%{opacity:1;}}
@keyframes fg-slideup{0%{opacity:0;transform:translateY(8px);}30%,70%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-4px);}}
@keyframes fg-countup{0%{opacity:0;}20%,100%{opacity:1;}}
@keyframes fg-sweep{0%{transform:rotate(-60deg);}50%{transform:rotate(60deg);}100%{transform:rotate(-60deg);}}
@keyframes fg-ring{0%{r:8;opacity:.8;}100%{r:32;opacity:0;}}
@keyframes fg-tick{0%,45%{transform:translateY(0);}50%,55%{transform:translateY(-1px);}60%,100%{transform:translateY(0);}}
@keyframes fg-barup{0%{transform:scaleY(.2);}100%{transform:scaleY(1);}}
@keyframes fg-shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
@keyframes fg-dash{to{stroke-dashoffset:-24;}}
@keyframes fg-needle{0%,100%{transform:rotate(-62deg);}50%{transform:rotate(44deg);}}
@keyframes fg-flip{0%,100%{transform:perspective(400px) rotateY(0deg);}50%{transform:perspective(400px) rotateY(-180deg);}}
@keyframes fg-drip{0%{transform:translateY(-8px);opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{transform:translateY(28px);opacity:0;}}

.feat-num{font-family:'Playfair Display',serif;font-size:13px;color:var(--ink-muted);margin-bottom:16px;letter-spacing:.06em;}
.feat-title{font-size:17px;font-weight:600;font-family:'Playfair Display',serif;color:var(--ink);margin-bottom:10px;}
.feat-desc{font-size:14px;color:var(--ink-muted);line-height:1.75;}
.feat-tag{display:inline-block;margin-top:14px;font-size:10.5px;font-weight:700;color:var(--blue-dark);letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;background:var(--blue-light);border-radius:4px;color:var(--blue-dark);}

/* FLOW — how a deal works */
.flow-section{background:var(--navy);padding:110px 32px;}
.flow-inner{max-width:1180px;margin:0 auto;}
.flow-eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.flow-eyebrow::before{content:'';display:block;width:20px;height:1.5px;background:var(--blue);}
.flow-header{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:end;margin-bottom:64px;padding-bottom:56px;border-bottom:1px solid rgba(255,255,255,0.08);}
.flow-title{font-size:clamp(30px,3.8vw,50px);font-weight:600;color:#fff;letter-spacing:-.02em;}
.flow-title em{font-style:italic;opacity:.55;}
.flow-sub{font-size:16px;color:rgba(255,255,255,0.5);line-height:1.8;}
.flow-steps{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid rgba(255,255,255,0.08);}
.flow-step{padding:36px 28px;border-right:1px solid rgba(255,255,255,0.08);position:relative;}
.flow-step:last-child{border-right:none;}
.flow-step::after{content:'→';position:absolute;right:-12px;top:36px;color:rgba(255,255,255,0.2);font-size:16px;z-index:1;}
.flow-step:last-child::after{display:none;}
.flow-step-num{font-family:'Playfair Display',serif;font-size:13px;color:rgba(255,255,255,0.25);margin-bottom:14px;letter-spacing:.06em;}
.flow-step-title{font-size:16px;font-weight:600;font-family:'Playfair Display',serif;color:#fff;margin-bottom:10px;}
.flow-step-desc{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.7;}

/* COMPARISON */
.compare-section{background:var(--white);padding:110px 32px;}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:64px;border:1px solid var(--border);}
.compare-col{padding:0;}
.compare-col-header{padding:24px 36px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.compare-col-header.old{background:var(--cream-mid);}
.compare-col-header.new{background:var(--navy);}
.compare-col-header.new .compare-label{color:#fff;}
.compare-col-header.new .compare-sub{color:rgba(255,255,255,0.5);}
.compare-label{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--ink);}
.compare-sub{font-size:12px;color:var(--ink-muted);margin-top:2px;}
.compare-divider{width:1px;background:var(--border);}
.compare-row{display:flex;align-items:flex-start;gap:12px;padding:20px 36px;border-bottom:1px solid var(--border);font-size:14px;color:var(--ink-mid);line-height:1.6;}
.compare-row:last-child{border-bottom:none;}
.compare-icon{flex-shrink:0;margin-top:2px;font-size:15px;width:20px;text-align:center;}

/* FAQ */
.faq-section{padding:110px 32px;}
.faq-inner{max-width:800px;margin:0 auto;}
.faq-list{margin-top:52px;}
.faq-item{border-bottom:1px solid var(--border);}
.faq-item:first-child{border-top:1px solid var(--border);}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:24px 0;cursor:pointer;gap:24px;}
.faq-q-text{font-size:16px;font-weight:500;color:var(--ink);font-family:'Playfair Display',serif;transition:color .2s;}
.faq-item.open .faq-q-text{color:var(--navy);}
.faq-q:hover .faq-q-text{color:var(--navy);}
.faq-icon{flex-shrink:0;transition:transform .25s;color:var(--ink-muted);}
.faq-item.open .faq-icon{transform:rotate(45deg);}
.faq-a{font-size:15px;color:var(--ink-muted);line-height:1.8;padding-bottom:24px;display:none;}
.faq-item.open .faq-a{display:block;}

/* CTA */
.cta-banner{background:var(--navy);padding:96px 32px;position:relative;overflow:hidden;}
.cta-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(59,130,246,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(255,200,80,0.06) 0%,transparent 60%);}
.cta-inner{max-width:1180px;margin:0 auto;position:relative;display:grid;grid-template-columns:1fr 480px;gap:80px;align-items:start;}
.cta-left{}
.cta-right{}
.cta-tag{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:24px;display:flex;align-items:center;gap:10px;}
.cta-tag::before{content:'';display:block;width:20px;height:1px;background:var(--blue);}
.cta-banner h2{font-size:clamp(32px,4.5vw,52px);color:#fff;margin-bottom:18px;letter-spacing:-.025em;}
.cta-banner h2 em{font-style:italic;opacity:.7;}
.cta-banner p{font-size:16px;color:rgba(255,255,255,0.6);margin-bottom:36px;line-height:1.85;}
.cta-checklist{list-style:none;display:flex;flex-direction:column;gap:0;margin-bottom:40px;}
.cta-check-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:14px;color:rgba(255,255,255,0.7);}
.cta-check-item:first-child{border-top:1px solid rgba(255,255,255,0.07);}
.cta-check-icon{width:20px;height:20px;border-radius:50%;background:rgba(59,130,246,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cta-panel{background:var(--white);border-radius:10px;}
.cta-panel > iframe{display:block;width:100%;border:none;min-height:680px;border-bottom-left-radius:10px;border-bottom-right-radius:10px;}
.cta-panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.cta-panel-icon{width:38px;height:38px;border-radius:8px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cta-panel-title{font-size:14px;font-weight:700;color:var(--ink);}
.cta-panel-sub{font-size:12px;color:var(--ink-muted);margin-top:2px;}
.cta-trust{display:flex;gap:24px;flex-wrap:wrap;margin-top:20px;}
.cta-trust-item{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.45);}
@media(max-width:900px){.cta-inner{grid-template-columns:1fr;gap:48px;}}
.btn-cream{background:var(--cream);color:var(--navy);border:none;padding:15px 30px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-cream:hover{background:#fff;transform:translateY(-2px);}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.7);border:1.5px solid rgba(255,255,255,0.2);padding:14px 28px;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-ghost:hover{border-color:rgba(255,255,255,0.5);color:#fff;}

/* BOOKING SECTION */
.booking-section{padding:100px 32px;background:var(--cream);border-top:1px solid var(--border);}
.booking-inner{max-width:960px;margin:0 auto;}
.booking-header{text-align:center;margin-bottom:56px;}
.booking-header .eyebrow{justify-content:center;}
.booking-header h2{font-size:clamp(30px,4vw,48px);font-weight:600;letter-spacing:-.025em;margin-bottom:16px;}
.booking-header h2 em{font-style:italic;color:var(--navy);}
.booking-header p{font-size:16px;color:var(--ink-muted);line-height:1.8;max-width:520px;margin:0 auto;}
.booking-panel{background:var(--white);border:1px solid var(--border);border-radius:10px;}
.booking-panel > iframe{display:block;width:100%;border:none;min-height:680px;border-bottom-left-radius:10px;border-bottom-right-radius:10px;}
.booking-panel-header{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;}
.booking-panel-icon{width:42px;height:42px;border-radius:10px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.booking-panel-title{font-size:15px;font-weight:700;color:var(--ink);}
.booking-panel-sub{font-size:12.5px;color:var(--ink-muted);margin-top:2px;}
.booking-trust{display:flex;align-items:center;justify-content:center;gap:32px;margin-top:36px;flex-wrap:wrap;}
.booking-trust-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-muted);}
.booking-trust-item svg{color:var(--blue);}

/* FOOTER */
.footer{background:var(--ink);padding:72px 32px 40px;}
.footer-inner{max-width:1180px;margin:0 auto;}
.footer-top{display:grid;grid-template-columns:1.6fr 1fr 1.2fr;gap:56px;padding-bottom:56px;border-bottom:1px solid rgba(255,255,255,0.08);}
.footer-brand p{font-size:13.5px;color:rgba(255,255,255,0.4);margin-top:20px;line-height:1.75;max-width:260px;}
.footer-brand img{height:30px;filter:brightness(0) invert(1);}
.footer-col h4{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,0.3);margin-bottom:18px;}
.footer-col a{display:block;font-size:14px;color:rgba(255,255,255,0.55);margin-bottom:11px;transition:color .2s;}
.footer-col a:hover{color:#fff;}
.footer-bottom{padding-top:28px;display:flex;align-items:center;justify-content:space-between;}
.footer-copy{font-size:13px;color:rgba(255,255,255,0.25);}

.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:none;}

@media(max-width:960px){
  .features-header,.flow-header,.problem-grid,.compare-grid,.testi-grid{grid-template-columns:1fr;}
  .flow-steps{grid-template-columns:1fr 1fr;}
  .features-grid{grid-template-columns:1fr 1fr;}
  .nav-pill{display:none;}
  .footer-top{grid-template-columns:1fr 1fr;gap:32px;}
  .problem-left{border-right:none;border-bottom:1px solid var(--border);}
  .compare-divider{display:none;}
  .cta-banner{padding:72px 20px;}
  .section{padding-left:20px;padding-right:20px;}
  .hero-top{padding:80px 20px 48px;}
}
@media(max-width:600px){
  .hero-top h1,.hero h1{font-size:clamp(34px,9vw,52px);}
  .hero-actions{flex-direction:column;align-items:stretch;}
  .hero-actions .btn-dark,.hero-actions .btn-outline,.hero-actions a{width:100%;text-align:center;justify-content:center;}
  .flow-steps,.features-grid{grid-template-columns:1fr;}
  .footer-top{grid-template-columns:1fr;}
  .cta-left h2{font-size:clamp(28px,7vw,40px);}
  .topbar-item:not(:first-child){display:none;}
  .topbar-divider{display:none;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroHeadline": "Close more deals.\nOn the first visit.",
  "heroSub": "ClearDeals puts a branded proposal, financing options, and e-signatures on a smart tablet — so your technicians walk out with a signed deal, not a \"let me think about it.\"",
  "ctaText": "Book a Demo",
  "showComparison": true
}/*EDITMODE-END*/;

function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
    }, {threshold: 0.08});
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function Nav({tweaks}) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const ctaLabel = (tweaks && tweaks.ctaText) ? tweaks.ctaText : 'Book a Demo';
  return (
    <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
      <div className="nav-inner">
        <a href="/home"><img src="uploads/Treat Engine Logo .png" alt="Treat Engine" style={{height:34}}/></a>
        <div className="nav-links">
          <a href="/home">Home</a>
          <a href="/websites">Water Websites</a>
          <a href="/">Water Leads</a>
          <a href="/sales" className="active">Water Sales</a>
        </div>
      </div>
    </nav>
  );
}

function Hero({tweaks}) {
  const lines = tweaks.heroHeadline.split('\n');
  const tickerItems = [
    'Professional proposals in seconds','E-signatures on the spot','Integrated financing options',
    'Dealer pricing controls','Product catalog built in','Works offline','Real-time analytics','Smart tablet included',
  ];
  const bullets = [
    'Branded proposals built in 5 minutes, on-site',

  const stats = [

function Trust() {

  const issues = [
    'The technician gives a verbal quote from memory — no visual, no context, no urgency',

function FeatureGraphic({kind}) {
  // On-brand colors: navy #1a2744, blue #3b82f6, gold oklch(0.72 0.10 72), ink #1c1814, muted #7a6f65
  const NAVY='#1a2744', BLUE='#3b82f6', GOLD='#c79a4a', INK='#1c1814', MUTED='#7a6f65', BORDER='rgba(28,24,20,0.14)';
  const common = {xmlns:'http://www.w3.org/2000/svg', viewBox:'0 0 320 180', preserveAspectRatio:'xMidYMid meet'};

  if (kind==='proposal') {
    // Document assembling itself: horizontal lines drawing in + line items stacking
    return (
      <svg {...common}>
        <rect x="90" y="22" width="140" height="140" rx="4" fill="#fff" stroke={BORDER} strokeWidth="1"/>
        <rect x="90" y="22" width="140" height="8" fill={NAVY}/>
        {/* header */}
        <rect x="100" y="42" width="60" height="6" rx="1" fill={INK} style={{animation:'fg-fadein .5s .1s both'}}/>
        <rect x="100" y="52" width="36" height="3" rx="1" fill={MUTED} style={{animation:'fg-fadein .5s .25s both'}}/>
        {/* line items */}
        {[0,1,2,3].map(i => (
          <g key={i} style={{animation:`fg-fadein .4s ${0.4 + i*0.25}s both`}}>
            <line x1="100" y1={74+i*16} x2="190" y2={74+i*16} stroke={BORDER} strokeWidth="1"/>
            <rect x="100" y={78+i*16} width={[52,68,44,58][i]} height="3" rx="1" fill={INK} opacity=".8"/>
            <rect x="200" y={78+i*16} width="20" height="3" rx="1" fill={BLUE}/>
          </g>
        ))}
        {/* total */}
        <line x1="100" y1="140" x2="220" y2="140" stroke={INK} strokeWidth="1" style={{animation:'fg-fadein .4s 1.5s both'}}/>
        <rect x="100" y="146" width="30" height="5" rx="1" fill={INK} style={{animation:'fg-fadein .4s 1.6s both'}}/>
        <rect x="190" y="146" width="30" height="5" rx="1" fill={NAVY} style={{animation:'fg-fadein .4s 1.7s both'}}/>
        {/* stamp */}
        <g transform="translate(232,130)">
          <g style={{animation:'fg-fadein .5s 1.9s both'}}>
            <g style={{animation:'fg-float 3s 2.4s ease-in-out infinite'}}>
              <circle r="22" fill="none" stroke={BLUE} strokeWidth="1.5" strokeDasharray="3 3"/>
              <path d="M-8 0 L-2 6 L8 -6" stroke={BLUE} strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            </g>
          </g>
        </g>
      </svg>
    );
  }

  if (kind==='presentation') {
    // Product cards sliding across with accent spotlight
    return (
      <svg {...common}>
        <defs>
          <clipPath id="fg-present-clip"><rect x="30" y="30" width="260" height="120" rx="4"/></clipPath>
        </defs>
        <rect x="30" y="30" width="260" height="120" rx="4" fill="#fff" stroke={BORDER} strokeWidth="1"/>
        <g clipPath="url(#fg-present-clip)">
          {[0,1,2,3,4].map(i => (
            <g key={i} style={{animation:`fg-slideup 4s ${i*0.8}s ease-in-out infinite`}}>
              <rect x={90 + i*0} y="48" width="140" height="84" rx="3" fill="#fff" stroke={BORDER}/>
              <rect x="100" y="58" width="60" height="40" rx="2" fill={NAVY} opacity=".08"/>
              <circle cx="130" cy="78" r="14" fill="none" stroke={NAVY} strokeWidth="1.5" opacity=".5"/>
              <rect x="170" y="62" width="50" height="4" rx="1" fill={INK}/>
              <rect x="170" y="70" width="36" height="2.5" rx="1" fill={MUTED}/>
              <rect x="170" y="80" width="44" height="2.5" rx="1" fill={MUTED}/>
              <rect x="170" y="86" width="30" height="2.5" rx="1" fill={MUTED}/>
              <rect x="100" y="108" width="20" height="16" rx="2" fill={BLUE} opacity=".15"/>
              <rect x="124" y="108" width="20" height="16" rx="2" fill={GOLD} opacity=".2"/>
              <rect x="180" y="112" width="40" height="4" rx="1" fill={NAVY}/>
            </g>
          ))}
        </g>
        {/* pagination dots */}

function TweaksPanel({tweaks, setTweaks, visible}) {
  if(!visible) return null;
  const update = (k,v) => {
    const next = {...tweaks,[k]:v};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
  };
  const fs = {width:'100%',padding:'8px 10px',border:'1px solid var(--border)',borderRadius:6,fontSize:13,fontFamily:'DM Sans,sans-serif',background:'var(--cream)',color:'var(--ink)',resize:'none'};
  const ls = {fontSize:11,fontWeight:600,color:'var(--ink-muted)',marginBottom:6,display:'block',textTransform:'uppercase',letterSpacing:'0.08em'};
  return (
    <div style={{position:'fixed',bottom:24,right:24,background:'var(--white)',borderRadius:12,boxShadow:'0 8px 40px rgba(28,24,20,0.12)',padding:24,width:300,zIndex:9999,border:'1px solid var(--border)',fontFamily:'DM Sans,sans-serif'}}>
      <div style={{fontSize:12,fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>Tweaks</div>
      <div style={{marginBottom:14}}>
        <label style={ls}>Hero Headline</label>
        <textarea value={tweaks.heroHeadline} onChange={e=>update('heroHeadline',e.target.value)} rows={2} style={fs}/>
      </div>
      <div style={{marginBottom:14}}>
        <label style={ls}>CTA Text</label>
        <input value={tweaks.ctaText} onChange={e=>update('ctaText',e.target.value)} style={fs}/>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:14,borderTop:'1px solid var(--border)'}}>
        <label style={{...ls,margin:0}}>Show comparison table</label>
        <input type="checkbox" checked={tweaks.showComparison} onChange={e=>update('showComparison',e.target.checked)} style={{width:16,height:16,accentColor:'var(--navy)'}}/>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  useReveal();
  useEffect(() => {
    const h = e => {
      if(e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', h);
  }, []);
  return (
    <>
      <Nav tweaks={tweaks}/>
      <Hero tweaks={tweaks}/>
      <Trust/>
      <Problem/>
      <Features/>
      <DealFlow/>
      <Comparison tweaks={tweaks}/>
      <FAQ/>
      <CTABanner tweaks={tweaks}/>
      <Footer/>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </>
  );
}
