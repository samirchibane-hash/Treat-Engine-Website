<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Websites — Treat Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#faf7f2;
  --cream-mid:#f0ebe0;
  --cream-dark:#e5ddd0;
  --ink:#1c1814;
  --ink-mid:#3d3530;
  --ink-muted:#7a6f65;
  --navy:#1a2744;
  --navy-light:#243460;
  --gold:oklch(0.72 0.10 72);
  --gold-dark:oklch(0.58 0.12 68);
  --blue:#3b82f6;
  --blue-light:#eff6ff;
  --blue-dark:#1d4ed8;
  --white:#fffefb;
  --border:rgba(28,24,20,0.10);
  --border-mid:rgba(28,24,20,0.06);
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.12;}
p{line-height:1.75;}
a{text-decoration:none;color:inherit;}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,247,242,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1180px;margin:0 auto;padding:0 32px;height:70px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo img{height:34px;width:auto;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--ink-muted);padding:7px 14px;border-radius:6px;letter-spacing:.01em;transition:all .2s;}
.nav-links a:hover{color:var(--ink);background:var(--cream-mid);}
.nav-links a.active{color:var(--blue);font-weight:600;background:var(--blue-light);}
.nav-pill{display:flex;background:var(--cream-mid);border:1px solid var(--border);border-radius:100px;padding:3px;gap:2px;}
.nav-pill a{font-size:12.5px;font-weight:600;padding:6px 16px;border-radius:100px;color:var(--ink-muted);transition:all .2s;letter-spacing:0.01em;}
.nav-pill a.active{background:var(--blue);color:#fff;}
.nav-pill a:hover:not(.active){color:var(--ink);}
.nav-cta{background:var(--blue);color:#fff;border:none;padding:11px 22px;border-radius:6px;font-size:13.5px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:background .2s,transform .15s;font-family:'DM Sans',sans-serif;}
.nav-cta:hover{background:var(--blue-dark);transform:translateY(-1px);}

/* ── HERO ── */
.hero{padding:130px 32px 0;max-width:1180px;margin:0 auto;}
.hero-top{display:grid;grid-template-columns:1fr 400px;gap:80px;align-items:end;padding-bottom:72px;border-bottom:1px solid var(--border);}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:28px;}
.hero-tag-line{width:28px;height:1.5px;background:var(--blue);}
.service-badge{display:inline-flex !important;align-items:center;gap:8px;background:var(--blue);color:#fff;padding:7px 16px !important;border-radius:100px !important;font-size:12px !important;font-weight:600;letter-spacing:.06em;text-transform:uppercase;width:auto !important;min-height:auto !important;uppercase;margin-bottom:24px;}
.service-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);}
.hero h1{font-size:clamp(42px,5vw,70px);font-weight:600;color:var(--ink);margin-bottom:28px;letter-spacing:-.025em;line-height:1.06;}
.hero h1 em{font-style:italic;color:var(--navy);}
.hero-sub{font-size:17px;color:var(--ink-muted);max-width:520px;margin-bottom:40px;line-height:1.8;}
.hero-mobile-cards{display:none;margin:24px 0;}
.hero-desktop-cards{display:block;overflow:visible;position:relative;z-index:1;}
.hero-left-col{position:relative;z-index:2;isolation:isolate;}
@media(max-width:768px){
  .hero-mobile-cards{
    order:4 !important;
    display:block !important;
    width:100% !important;
    margin:0 !important;
  }
  .hero-desktop-cards{display:none !important;}
}
@media(max-width:700px){
  .site-stack{height:280px;}
  .site-fan{padding-left:0;}
}
.btn-dark{background:var(--blue);color:#fff;border:none;padding:15px 28px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.01em;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-dark:hover{background:var(--blue-dark);transform:translateY(-2px);}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border);padding:14px 24px;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-outline:hover{border-color:var(--ink-muted);}
.hero-aside{padding-bottom:8px;}
.hero-aside-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:16px;}
.hero-stat-row{padding:18px 0;border-bottom:1px solid var(--border-mid);}
.hero-stat-row:last-child{border-bottom:none;}
.hero-stat-num{font-family:'Playfair Display',serif;font-size:38px;font-weight:600;color:var(--navy);line-height:1;}
.hero-stat-label{font-size:13px;color:var(--ink-muted);margin-top:4px;}

/* Ticker */
.hero-ticker{padding:22px 0;overflow:hidden;white-space:nowrap;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.hero-ticker-inner{display:inline-flex;animation:ticker 30s linear infinite;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.hero-ticker-item{display:inline-flex;align-items:center;gap:12px;padding:0 32px;font-size:13px;color:var(--ink-muted);font-weight:500;}
.hero-ticker-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0;}

/* ── SHARED ── */
.section{padding:110px 32px;}
.section-inner{max-width:1180px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';display:block;width:20px;height:1.5px;background:var(--blue);}
.section-title{font-size:clamp(30px,3.8vw,50px);font-weight:600;color:var(--ink);margin-bottom:20px;letter-spacing:-.02em;}
.section-sub{font-size:16.5px;color:var(--ink-muted);max-width:540px;line-height:1.8;}

/* ── PROBLEM ── */
.problem-section{background:var(--navy);padding:110px 32px;}
.problem-inner{max-width:1180px;margin:0 auto;}
.problem-eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.problem-eyebrow::before{content:'';display:block;width:20px;height:1.5px;background:var(--blue);}
.problem-header{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:end;margin-bottom:72px;padding-bottom:56px;border-bottom:1px solid rgba(255,255,255,0.08);}
.problem-title{font-size:clamp(30px,3.8vw,50px);font-weight:600;color:#fff;letter-spacing:-.02em;}
.problem-title em{font-style:italic;opacity:0.55;}
.problem-sub{font-size:16px;color:rgba(255,255,255,0.55);line-height:1.8;}
.problem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid rgba(255,255,255,0.08);}
.problem-card{padding:40px;border-right:1px solid rgba(255,255,255,0.08);}
.problem-card:last-child{border-right:none;}
.problem-num{font-family:'Playfair Display',serif;font-size:48px;font-weight:700;color:rgba(255,255,255,0.08);line-height:1;margin-bottom:16px;}
.problem-title-sm{font-size:17px;font-weight:600;color:#fff;margin-bottom:10px;font-family:'Playfair Display',serif;}
.problem-desc{font-size:14px;color:rgba(255,255,255,0.5);line-height:1.75;}

/* ── FEATURES ── */
.features-section{padding:110px 32px;}
.features-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;margin-top:72px;border:1px solid var(--border);}
.feature-card{padding:48px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);transition:background .2s;}
.feature-card:hover{background:var(--white);}
.feature-card:nth-child(even){border-right:none;}
.feature-card:nth-last-child(-n+2){border-bottom:none;}
.feature-num{font-family:'Playfair Display',serif;font-size:13px;color:var(--ink-muted);margin-bottom:20px;letter-spacing:.06em;}
.feature-title{font-size:20px;font-weight:600;color:var(--ink);margin-bottom:10px;font-family:'Playfair Display',serif;}
.feature-desc{font-size:14px;color:var(--ink-muted);line-height:1.8;}
.feature-tag{display:inline-block;margin-top:16px;font-size:11px;font-weight:600;color:var(--blue-dark);letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;background:var(--blue-light);border-radius:4px;color:var(--blue-dark);}

/* ── PROCESS ── */
.process-section{background:var(--white);padding:110px 32px;}
.process-steps{margin-top:72px;display:flex;flex-direction:column;gap:0;border:1px solid var(--border);}
.process-step{display:grid;grid-template-columns:80px 1fr 1fr;gap:0;border-bottom:1px solid var(--border);align-items:start;transition:background .2s;}
.process-step:last-child{border-bottom:none;}
.process-step:hover{background:var(--cream);}
.process-step-num{padding:36px 32px;border-right:1px solid var(--border);font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:var(--ink-muted);}
.process-step-left{padding:36px 40px;border-right:1px solid var(--border);}
.process-step-title{font-size:19px;font-weight:600;font-family:'Playfair Display',serif;color:var(--ink);margin-bottom:8px;}
.process-step-time{font-size:12px;color:var(--gold-dark);font-weight:600;text-transform:uppercase;letter-spacing:.08em;}
.process-step-right{padding:36px 40px;}
.process-step-desc{font-size:14px;color:var(--ink-muted);line-height:1.8;}

/* ── CTA ── */
.cta-banner{background:var(--navy);padding:96px 32px;position:relative;overflow:hidden;}
.cta-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(59,130,246,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(255,200,80,0.06) 0%,transparent 60%);}
.cta-inner{max-width:1180px;margin:0 auto;position:relative;display:grid;grid-template-columns:1fr 480px;gap:80px;align-items:start;}
.cta-left{}
.cta-right{}
.cta-tag{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:24px;display:flex;align-items:center;gap:10px;}
.cta-tag::before{content:'';display:block;width:20px;height:1px;background:var(--blue);}
.cta-banner h2{font-size:clamp(32px,4.5vw,52px);color:#fff;margin-bottom:18px;letter-spacing:-.025em;}
.cta-banner h2 em{font-style:italic;opacity:.7;}
.cta-banner p{font-size:16px;color:rgba(255,255,255,0.6);margin-bottom:36px;line-height:1.85;}
.cta-checklist{list-style:none;display:flex;flex-direction:column;gap:0;margin-bottom:40px;}
.cta-check-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.07);font-size:14px;color:rgba(255,255,255,0.7);}
.cta-check-item:first-child{border-top:1px solid rgba(255,255,255,0.07);}
.cta-check-icon{width:20px;height:20px;border-radius:50%;background:rgba(59,130,246,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cta-panel{background:var(--white);border-radius:10px;}
.cta-panel > iframe{display:block;width:100%;border:none;min-height:680px;border-bottom-left-radius:10px;border-bottom-right-radius:10px;}
.cta-panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.cta-panel-icon{width:38px;height:38px;border-radius:8px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cta-panel-title{font-size:14px;font-weight:700;color:var(--ink);}
.cta-panel-sub{font-size:12px;color:var(--ink-muted);margin-top:2px;}
.cta-trust{display:flex;gap:24px;flex-wrap:wrap;margin-top:20px;}
.cta-trust-item{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.45);}
@media(max-width:900px){.cta-inner{grid-template-columns:1fr;gap:48px;}}
.btn-cream{background:var(--cream);color:var(--navy);border:none;padding:15px 30px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;letter-spacing:.01em;}
.btn-cream:hover{background:#fff;transform:translateY(-2px);}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.7);border:1.5px solid rgba(255,255,255,0.2);padding:14px 28px;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-ghost:hover{border-color:rgba(255,255,255,0.5);color:#fff;}

/* ── FOOTER ── */
.footer{background:var(--ink);padding:72px 32px 40px;}
.footer-inner{max-width:1180px;margin:0 auto;}
.footer-top{display:grid;grid-template-columns:1.6fr 1fr 1.2fr;gap:56px;padding-bottom:56px;border-bottom:1px solid rgba(255,255,255,0.08);}
.footer-brand p{font-size:13.5px;color:rgba(255,255,255,0.4);margin-top:20px;line-height:1.75;max-width:260px;}
.footer-brand img{height:30px;}
.footer-col h4{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,0.3);margin-bottom:18px;}
.footer-col a{display:block;font-size:14px;color:rgba(255,255,255,0.55);margin-bottom:11px;transition:color .2s;}
.footer-col a:hover{color:#fff;}
.footer-bottom{padding-top:28px;display:flex;align-items:center;justify-content:space-between;}
.footer-copy{font-size:13px;color:rgba(255,255,255,0.25);}

.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:none;}

/* ── SITE PREVIEW STACK (hero right) ── */
.site-stack{position:relative;width:100%;height:500px;display:flex;flex-direction:column;align-items:center;}
.site-stack-label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);align-self:flex-start;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.site-stack-label::before{content:'';display:block;width:20px;height:1.5px;background:var(--blue);}

/* Fan container */
.site-fan{position:relative;width:100%;flex:1;padding-left:20px;}

/* Cards */
.site-card{
  position:absolute;
  width:380px;height:260px;
  border-radius:14px;overflow:hidden;
  background:var(--white);cursor:pointer;
  box-shadow:0 24px 64px -12px rgba(28,24,20,0.22),0 0 0 1px rgba(28,24,20,0.07);
  transition:transform .5s cubic-bezier(.34,1.2,.64,1),box-shadow .3s ease;
  transform-origin:50% 100%;
  will-change:transform;
}

/* Desktop fan — all 3 visible, dramatic spread */
.site-card:nth-child(1){
  transform:rotate(-18deg) translate(-30px, 60px);
  z-index:1;
  left:calc(50% - 190px);
}
.site-card:nth-child(2){
  transform:rotate(-3deg) translate(20px, 0px);
  z-index:3;
  left:calc(50% - 190px);
}
.site-card:nth-child(3){
  transform:rotate(15deg) translate(70px, 50px);
  z-index:2;
  left:calc(50% - 190px);
}

/* Hover lifts each card cleanly */
.site-card:nth-child(1):hover{transform:rotate(-18deg) translate(-30px, 10px);z-index:10;box-shadow:0 40px 80px -12px rgba(28,24,20,0.32),0 0 0 1.5px rgba(59,130,246,0.5);}
.site-card:nth-child(2):hover{transform:rotate(-3deg) translate(20px, -40px);z-index:10;box-shadow:0 40px 80px -12px rgba(28,24,20,0.32),0 0 0 1.5px rgba(59,130,246,0.5);}
.site-card:nth-child(3):hover{transform:rotate(15deg) translate(70px, 0px);z-index:10;box-shadow:0 40px 80px -12px rgba(28,24,20,0.32),0 0 0 1.5px rgba(59,130,246,0.5);}

/* Card internals */
.site-card-bar{height:28px;background:#f3f0ea;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;padding:0 10px;flex-shrink:0;}
.site-card-dots{display:flex;gap:4px;}
.site-card-dot{width:8px;height:8px;border-radius:50%;}
.site-card-url{flex:1;background:#fff;border:1px solid var(--border);border-radius:4px;height:16px;font-size:9px;color:var(--ink-muted);font-family:'DM Sans',sans-serif;display:flex;align-items:center;padding:0 7px;overflow:hidden;white-space:nowrap;}
.site-card-viewport{width:380px;height:232px;overflow:hidden;position:relative;background:var(--cream);}
.site-card-iframe-wrap{position:absolute;top:0;left:0;width:1280px;height:900px;transform-origin:top left;transform:scale(0.297);pointer-events:none;}
.site-card-iframe-wrap iframe{width:1280px;height:900px;border:none;display:block;}

/* Hover overlay */
.site-card-cta{
  position:absolute;inset:0;
  background:rgba(26,39,68,0.0);
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  transition:opacity .2s,background .2s;
}
.site-card:hover .site-card-cta{opacity:1;background:rgba(26,39,68,0.5);}
.site-card-cta-btn{
  background:#fff;color:var(--navy);
  font-size:12px;font-weight:700;
  padding:10px 20px;border-radius:24px;
  display:flex;align-items:center;gap:7px;
  font-family:'DM Sans',sans-serif;
  letter-spacing:.02em;
  box-shadow:0 4px 16px rgba(0,0,0,0.15);
  transform:translateY(6px);
  transition:transform .2s;
}
.site-card:hover .site-card-cta-btn{transform:translateY(0);}

/* Hint */
.site-stack-hint{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--ink-muted);margin-top:8px;}
.site-stack-hint-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);}

/* ── MODAL ── */
.site-modal-backdrop{
  position:fixed;inset:0;
  background:rgba(10,15,30,0.88);
  z-index:1000;
  display:flex;align-items:center;justify-content:center;
  animation:modalIn .2s ease;
  backdrop-filter:blur(8px);
}
@keyframes modalIn{from{opacity:0}to{opacity:1}}
.site-modal{
  width:92vw;max-width:1400px;height:88vh;
  background:var(--white);border-radius:14px;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 48px 120px rgba(0,0,0,0.55);
  animation:modalSlide .35s cubic-bezier(.34,1.2,.64,1);
}
@keyframes modalSlide{from{transform:translateY(40px) scale(0.95);opacity:0}to{transform:none;opacity:1}}
.site-modal-bar{height:44px;background:#f3f0ea;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px;flex-shrink:0;}
.site-modal-dots{display:flex;gap:6px;}
.site-modal-dot{width:11px;height:11px;border-radius:50%;}
.site-modal-url{flex:1;background:#fff;border:1px solid var(--border);border-radius:6px;height:24px;font-size:11px;color:var(--ink-muted);display:flex;align-items:center;padding:0 12px;font-family:monospace;max-width:420px;margin:0 auto;overflow:hidden;}
.site-modal-tabs{display:flex;gap:4px;margin-left:12px;}
.site-modal-tab{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--ink-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.site-modal-tab.active,.site-modal-tab:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
.site-modal-close{width:32px;height:32px;border-radius:50%;background:rgba(28,24,20,0.08);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink-mid);transition:background .2s;margin-left:8px;}

<script type="text/babel">
const {useState, useEffect} = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

}/*EDITMODE-END*/;

function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
    }, {threshold: 0.08});
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function Nav({tweaks}) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const ctaLabel = (tweaks && tweaks.ctaText) ? tweaks.ctaText : 'Book a Demo';
  return (
    <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
      <div className="nav-inner">
        <a href="/home"><img src="uploads/Treat Engine Logo .png" alt="Treat Engine" style={{height:34}}/></a>
        <div className="nav-links">
          <a href="/home">Home</a>
          <a href="/websites" className="active">Water Websites</a>
          <a href="/ads">Water Leads</a>
          <a href="/sales">Water Sales</a>
        </div>
      </div>
    </nav>
  );
}

function SiteStack({mobileOnly}) {
  const sites = [
    {name:'Tar Heel Water Systems', url:'new.tarheelwatersystems.com', src:'https://new.tarheelwatersystems.com/'},

  ];
  const [expanded, setExpanded] = useState(null);
  const [mobileActive, setMobileActive] = useState(1); // index 1 = Select Source Water = front
  const [isMobile, setIsMobile] = useState(false);

  useEffect(() => {
    const check = () => setIsMobile(window.innerWidth <= 700);
    check();
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);

  useEffect(() => {
    if(expanded === null) return;
    const h = (e) => { if(e.key === 'Escape') setExpanded(null); };
    window.addEventListener('keydown', h);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', h); document.body.style.overflow = ''; };
  }, [expanded]);

  const getMobileClass = (i) => {
    if(!isMobile) return '';
    if(i === mobileActive) return 'mobile-active';
    if(i === (mobileActive - 1 + sites.length) % sites.length) return 'mobile-prev';
    if(i === (mobileActive + 1) % sites.length) return 'mobile-next';
    return '';
  };

  return (
    <>
      <div className="site-stack">
        <div className="site-stack-label">Recent builds — click to explore</div>

          {sites.map((s, i) => (
            <div
              className={`site-card ${getMobileClass(i)}`}
              key={s.url}
              onClick={() => isMobile ? (i === mobileActive ? setExpanded(i) : setMobileActive(i)) : setExpanded(i)}
            >
              <div className="site-card-bar">
                <div className="site-card-dots">
                  <div className="site-card-dot" style={{background:'#f87171'}}/>
                  <div className="site-card-dot" style={{background:'#fbbf24'}}/>
                  <div className="site-card-dot" style={{background:'#4ade80'}}/>
                </div>
                <div className="site-card-url">{s.url}</div>
              </div>
              <div className="site-card-viewport">

              <div className="site-card-cta">
                <div className="site-card-cta-btn">
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2h8v8H2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/><path d="M5 2v8M2 5h8" stroke="currentColor" strokeWidth="1.5"/></svg>
                  View full site
                </div>
              </div>
            </div>
          ))}
        </div>
        <div className="site-stack-nav">
          <button className="site-stack-nav-btn" onClick={() => setMobileActive((mobileActive-1+sites.length)%sites.length)}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <div className="site-stack-nav-dots">
            {sites.map((_,i) => <button key={i} className={`site-stack-nav-pip ${i===mobileActive?'active':''}`} onClick={() => setMobileActive(i)}/>)}
          </div>
          <button className="site-stack-nav-btn" onClick={() => setMobileActive((mobileActive+1)%sites.length)}>

          </button>
        </div>
        <div className="site-stack-hint">
          <span className="site-stack-hint-dot"/>

      </div>

      {expanded !== null && ReactDOM.createPortal(
        <div className="site-modal-backdrop" onClick={(e) => { if(e.target===e.currentTarget) setExpanded(null); }}>
          <div className="site-modal">
            <div className="site-modal-bar">

                <div className="site-modal-dot" style={{background:'#f87171',cursor:'pointer'}} onClick={() => setExpanded(null)}/>
                <div className="site-modal-dot" style={{background:'#fbbf24'}}/>
                <div className="site-modal-dot" style={{background:'#4ade80'}}/>
              </div>
              <div className="site-modal-url">https://{sites[expanded].url}</div>
              <div className="site-modal-tabs">
                {sites.map((s,i) => <button key={s.url} className={`site-modal-tab ${i===expanded?'active':''}`} onClick={() => setExpanded(i)}>{s.name}</button>)}
              </div>
              <button className="site-modal-close" onClick={() => setExpanded(null)}>✕</button>
            </div>
            <iframe key={expanded} className="site-modal-iframe" src={sites[expanded].src} title={sites[expanded].name} sandbox="allow-same-origin allow-scripts allow-forms allow-popups"/>
          </div>
        </div>,
        document.body
      )}
    </>
  );
}

function TweaksPanel({tweaks, setTweaks, visible}) {
  if(!visible) return null;
  const update = (k,v) => {
    const next = {...tweaks, [k]: v};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: next}, '*');
  };
  const fs = {width:'100%',padding:'8px 10px',border:'1px solid var(--border)',borderRadius:6,fontSize:13,fontFamily:'DM Sans,sans-serif',background:'var(--cream)',color:'var(--ink)',resize:'none'};
  const ls = {fontSize:11,fontWeight:600,color:'var(--ink-muted)',marginBottom:6,display:'block',textTransform:'uppercase',letterSpacing:'0.08em'};
  return (
    <div style={{position:'fixed',bottom:24,right:24,background:'var(--white)',borderRadius:12,boxShadow:'0 8px 40px rgba(28,24,20,0.12)',padding:24,width:300,zIndex:9999,border:'1px solid var(--border)',fontFamily:'DM Sans,sans-serif'}}>
      <div style={{fontSize:12,fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>Tweaks</div>
      <div style={{marginBottom:14}}>
        <label style={ls}>Hero Headline</label>
        <textarea value={tweaks.heroHeadline} onChange={e=>update('heroHeadline',e.target.value)} rows={2} style={fs}/>
      </div>
      <div style={{marginBottom:14}}>
        <label style={ls}>CTA Text</label>
        <input value={tweaks.ctaText} onChange={e=>update('ctaText',e.target.value)} style={fs}/>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  useReveal();
  useEffect(() => {
    const h = e => {
      if(e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  return (
    <>
      <Nav tweaks={tweaks}/>
      <Hero tweaks={tweaks}/>
      <Problem/>
      <Features/>
      <Process/>
      <CTABanner tweaks={tweaks}/>
      <Footer/>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

    document.body.appendChild(s);

});
