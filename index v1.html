<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treat Engine — Sales & Marketing for Water Treatment Dealers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #3b82f6;
    --blue-dark: #1d4ed8;
    --blue-deep: #1e3a5f;
    --blue-light: #eff6ff;
    --blue-mid: #dbeafe;
    --orange: oklch(0.68 0.18 45);
    --orange-dark: oklch(0.58 0.20 45);
    --white: #fafcff;
    --off-white: #f0f6ff;
    --text: #0f172a;
    --text-mid: #334155;
    --text-muted: #64748b;
    --border: rgba(59,130,246,0.12);
    --shadow: 0 4px 24px rgba(30,58,95,0.08);
    --shadow-lg: 0 12px 48px rgba(30,58,95,0.14);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--white); color: var(--text); overflow-x: hidden; }
  h1,h2,h3,h4 { font-family: 'Playfair Display', serif; line-height: 1.15; }
  p { line-height: 1.7; }
  a { text-decoration: none; color: inherit; }

  /* Nav */
  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(250,252,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 68px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { display: flex; align-items: center; gap: 10px; }
  .nav-logo img { height: 36px; width: auto; }
  .nav-links { display: flex; align-items: center; gap: 32px; }
  .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-mid); transition: color 0.2s; }
  .nav-links a:hover { color: var(--blue); }
  .nav-cta { background: var(--blue); color: #fff; border: none; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.15s; font-family: 'Plus Jakarta Sans', sans-serif; }
  .nav-cta:hover { background: var(--blue-dark); transform: translateY(-1px); }

  /* Hero */
  .hero { padding: 140px 24px 80px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: var(--blue-light); border: 1px solid var(--blue-mid); color: var(--blue-dark); padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 24px; }
  .hero-eyebrow-dot { width: 7px; height: 7px; background: var(--blue); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(1.4); } }
  .hero h1 { font-size: clamp(38px, 4.5vw, 58px); font-weight: 700; color: var(--text); margin-bottom: 22px; line-height: 1.1; }
  .hero h1 em { color: var(--blue); font-style: normal; }
  .hero-sub { font-size: 17px; color: var(--text-muted); margin-bottom: 36px; max-width: 480px; }
  .hero-actions { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .btn-primary { background: var(--orange); color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; box-shadow: 0 4px 20px rgba(220,120,40,0.3); }
  .btn-primary:hover { background: var(--orange-dark); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(220,120,40,0.4); }
  .btn-secondary { background: transparent; color: var(--blue-deep); border: 1.5px solid var(--blue); padding: 13px 24px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
  .btn-secondary:hover { background: var(--blue-light); }
  .hero-stats { display: flex; gap: 28px; margin-top: 44px; }
  .hero-stat { text-align: left; }
  .hero-stat-num { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--blue-deep); line-height: 1; }
  .hero-stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
  .hero-stat-divider { width: 1px; background: var(--border); }

  /* Hero visual */
  .hero-visual { position: relative; }
  .hero-card { background: #fff; border-radius: 20px; box-shadow: var(--shadow-lg); overflow: hidden; border: 1px solid var(--border); }
  .hero-card-header { background: linear-gradient(135deg, var(--blue-deep), var(--blue)); padding: 24px; color: #fff; }
  .hero-card-header h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 600; opacity: 0.8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
  .hero-card-header p { font-size: 22px; font-weight: 700; font-family: 'Playfair Display', serif; }
  .hero-card-body { padding: 20px 24px; }
  .hero-lead-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
  .hero-lead-row:last-child { border-bottom: none; }
  .hero-lead-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-light), var(--blue-mid)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--blue-dark); flex-shrink: 0; }
  .hero-lead-info { flex: 1; }
  .hero-lead-name { font-size: 13px; font-weight: 600; }
  .hero-lead-loc { font-size: 12px; color: var(--text-muted); }
  .hero-lead-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
  .badge-hot { background: #fef2f2; color: #dc2626; }
  .badge-warm { background: #fffbeb; color: #d97706; }
  .badge-new { background: var(--blue-light); color: var(--blue-dark); }
  .hero-floating { position: absolute; background: #fff; border-radius: 14px; box-shadow: 0 8px 32px rgba(30,58,95,0.14); padding: 14px 18px; border: 1px solid var(--border); }
  .hero-floating-a { top: -18px; right: -18px; }
  .hero-floating-b { bottom: -18px; left: -18px; }
  .hero-floating-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .hero-floating-value { font-size: 20px; font-weight: 700; color: var(--blue-deep); font-family: 'Playfair Display', serif; }
  .hero-floating-sub { font-size: 11px; color: #16a34a; font-weight: 600; }

  /* Trust bar */
  .trust-bar { background: var(--blue-light); border-top: 1px solid var(--blue-mid); border-bottom: 1px solid var(--blue-mid); padding: 28px 24px; }
  .trust-bar-inner { max-width: 1100px; margin: 0 auto; }
  .trust-bar-label { text-align: center; font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; }
  .trust-logos { display: flex; align-items: center; justify-content: center; gap: 48px; flex-wrap: wrap; }
  .trust-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--blue-deep); opacity: 0.6; transition: opacity 0.2s; letter-spacing: 0.02em; }
  .trust-logo:hover { opacity: 1; }

  /* Section shared */
  .section { padding: 100px 24px; }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .section-eyebrow { font-size: 12px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
  .section-title { font-size: clamp(28px, 3.5vw, 44px); font-weight: 700; color: var(--text); margin-bottom: 18px; }
  .section-sub { font-size: 17px; color: var(--text-muted); max-width: 560px; }

  /* How it works */
  .how-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: start; margin-top: 64px; }
  .how-steps { display: flex; flex-direction: column; gap: 0; }
  .how-step { display: flex; gap: 20px; padding: 28px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  .how-step:last-child { border-bottom: none; }
  .how-step.active .how-step-num { background: var(--blue); color: #fff; }
  .how-step.active .how-step-title { color: var(--blue); }
  .how-step-num { width: 40px; height: 40px; border-radius: 50%; background: var(--blue-light); color: var(--blue); font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; border: 2px solid var(--blue-mid); }
  .how-step-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; transition: color 0.2s; }
  .how-step-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .how-visual { position: sticky; top: 100px; background: var(--off-white); border-radius: 20px; min-height: 360px; display: flex; align-items: center; justify-content: center; border: 2px dashed var(--blue-mid); overflow: hidden; }
  .how-visual-content { padding: 32px; text-align: center; }
  .how-screen { background: #fff; border-radius: 14px; box-shadow: var(--shadow); padding: 24px; min-width: 280px; }
  .how-screen-bar { display: flex; gap: 6px; margin-bottom: 16px; }
  .how-screen-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Ads showcase */
  .ads-section { background: var(--blue-deep); padding: 100px 24px; }
  .ads-inner { max-width: 1100px; margin: 0 auto; }
  .ads-header { display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: end; margin-bottom: 52px; }
  .ads-section .section-eyebrow { color: rgba(255,255,255,0.5); }
  .ads-section .section-title { color: #fff; }
  .ads-section .section-sub { color: rgba(255,255,255,0.65); }
  .ads-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .ad-card { border-radius: 14px; overflow: hidden; aspect-ratio: 9/16; position: relative; background: var(--blue-mid); cursor: pointer; transition: transform 0.2s; }
  .ad-card:hover { transform: scale(1.03); }
  .ad-card-stripe { height: 100%; background: repeating-linear-gradient(45deg, rgba(59,130,246,0.08) 0px, rgba(59,130,246,0.08) 2px, transparent 2px, transparent 12px); display: flex; flex-direction: column; justify-content: flex-end; padding: 16px; }
  .ad-card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
  .ad-card-title { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.3; }
  .ad-card-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 48px; height: 48px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .ad-card-play svg { margin-left: 3px; }
  .ad-card-bg-1 { background: linear-gradient(160deg, #1e40af, #3b82f6); }
  .ad-card-bg-2 { background: linear-gradient(160deg, #0f4c75, #1b77c8); }
  .ad-card-bg-3 { background: linear-gradient(160deg, #1e3a5f, #2563eb); }
  .ad-card-bg-4 { background: linear-gradient(160deg, #0369a1, #38bdf8); }

  /* Why it works */
  .why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 56px; }
  .why-card { background: #fff; border-radius: 16px; padding: 32px; border: 1px solid var(--border); transition: all 0.2s; box-shadow: var(--shadow); }
  .why-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--blue-mid); }
  .why-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--blue-light); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .why-icon svg { color: var(--blue); }
  .why-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .why-desc { font-size: 14px; color: var(--text-muted); line-height: 1.7; }

  /* Guarantee */
  .guarantee-section { background: linear-gradient(135deg, var(--blue-light) 0%, #fff 100%); border-top: 1px solid var(--blue-mid); border-bottom: 1px solid var(--blue-mid); padding: 100px 24px; }
  .guarantee-inner { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: auto 1fr; gap: 64px; align-items: center; }
  .guarantee-badge { width: 160px; height: 160px; border-radius: 50%; background: var(--blue-deep); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; flex-shrink: 0; box-shadow: 0 8px 32px rgba(30,58,95,0.25); border: 4px solid var(--blue); }
  .guarantee-badge-num { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 900; line-height: 1; }
  .guarantee-badge-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.8; }
  .guarantee-title { font-size: clamp(26px, 3vw, 38px); font-weight: 700; margin-bottom: 16px; }
  .guarantee-desc { font-size: 16px; color: var(--text-muted); margin-bottom: 28px; }
  .guarantee-list { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .guarantee-list li { display: flex; align-items: flex-start; gap: 10px; font-size: 15px; color: var(--text-mid); }
  .guarantee-check { color: var(--blue); flex-shrink: 0; margin-top: 2px; }

  /* Testimonials */
  .testimonials-section { padding: 100px 24px; background: var(--off-white); }
  .testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 52px; }
  .testi-card { background: #fff; border-radius: 16px; padding: 28px; border: 1px solid var(--border); box-shadow: var(--shadow); }
  .testi-stars { display: flex; gap: 3px; margin-bottom: 16px; }
  .testi-star { color: #f59e0b; font-size: 14px; }
  .testi-quote { font-size: 15px; color: var(--text-mid); line-height: 1.7; margin-bottom: 20px; font-style: italic; }
  .testi-author { display: flex; align-items: center; gap: 12px; }
  .testi-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-light), var(--blue-mid)); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--blue-dark); font-size: 15px; flex-shrink: 0; }
  .testi-name { font-weight: 700; font-size: 14px; }
  .testi-role { font-size: 12px; color: var(--text-muted); }

  /* FAQ */
  .faq-section { padding: 100px 24px; }
  .faq-inner { max-width: 760px; margin: 0 auto; }
  .faq-list { margin-top: 48px; display: flex; flex-direction: column; gap: 4px; }
  .faq-item { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .faq-item.open { border-color: var(--blue-mid); }
  .faq-q { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; cursor: pointer; font-weight: 600; font-size: 15px; color: var(--text); gap: 16px; background: #fff; transition: background 0.15s; }
  .faq-q:hover { background: var(--blue-light); }
  .faq-item.open .faq-q { background: var(--blue-light); color: var(--blue-dark); }
  .faq-icon { flex-shrink: 0; transition: transform 0.25s; color: var(--blue); }
  .faq-item.open .faq-icon { transform: rotate(45deg); }
  .faq-a { font-size: 14px; color: var(--text-muted); line-height: 1.75; padding: 0 24px 20px; background: var(--blue-light); display: none; }
  .faq-item.open .faq-a { display: block; }

  /* CTA banner */
  .cta-banner { background: linear-gradient(135deg, var(--blue-deep) 0%, #1d4ed8 100%); padding: 100px 24px; text-align: center; position: relative; overflow: hidden; }
  .cta-banner::before { content:''; position:absolute; inset:0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
  .cta-banner-inner { max-width: 680px; margin: 0 auto; position: relative; }
  .cta-banner h2 { font-size: clamp(30px, 4vw, 50px); color: #fff; margin-bottom: 18px; }
  .cta-banner p { font-size: 18px; color: rgba(255,255,255,0.75); margin-bottom: 40px; }
  .cta-banner-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn-white { background: #fff; color: var(--blue-deep); border: none; padding: 15px 32px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .btn-white:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.22); }
  .btn-ghost-white { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.45); padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
  .btn-ghost-white:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.7); }

  /* Footer */
  .footer { background: var(--text); padding: 64px 24px 40px; }
  .footer-inner { max-width: 1100px; margin: 0 auto; }
  .footer-top { display: grid; grid-template-columns: 1.8fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 56px; }
  .footer-brand p { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 16px; line-height: 1.7; max-width: 280px; }
  .footer-brand-logo { display: flex; align-items: center; gap: 8px; }
  .footer-brand-logo img { height: 32px; filter: brightness(0) invert(1); }
  .footer-col h4 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
  .footer-col a { display: block; font-size: 14px; color: rgba(255,255,255,0.65); margin-bottom: 10px; transition: color 0.2s; }
  .footer-col a:hover { color: #fff; }
  .footer-bottom { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 28px; display: flex; align-items: center; justify-content: space-between; }
  .footer-copy { font-size: 13px; color: rgba(255,255,255,0.35); }

  /* Scroll reveal */
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; gap: 48px; padding-top: 100px; }
    .how-grid { grid-template-columns: 1fr; }
    .how-visual { display: none; }
    .why-grid { grid-template-columns: 1fr 1fr; }
    .testimonials-grid { grid-template-columns: 1fr; }
    .ads-grid { grid-template-columns: repeat(2, 1fr); }
    .footer-top { grid-template-columns: 1fr 1fr; gap: 32px; }
    .guarantee-inner { grid-template-columns: 1fr; text-align: center; gap: 32px; }
    .guarantee-badge { margin: 0 auto; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "headline": "Booked Installs. Not Just Leads.",
  "subheadline": "Treat Engine is the growth engine for residential water treatment dealers — delivering exclusive, appointment-ready customers through proven paid ads, custom creative, and a done-for-you system.",
  "ctaText": "Book a Free Strategy Call",
  "guaranteeDays": "60",
  "accentColor": "#3b82f6"
}/*EDITMODE-END*/;

function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function Nav({ tweaks }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', handler);
    return () => window.removeEventListener('scroll', handler);
  }, []);
  return (
    <nav className="nav" style={{ boxShadow: scrolled ? '0 2px 20px rgba(30,58,95,0.1)' : 'none' }}>
      <div className="nav-inner">
        <div className="nav-logo">
          <img src="uploads/Treat Engine Logo .png" alt="Treat Engine" />
        </div>
        <div className="nav-links">
          <a href="#how">How It Works</a>
          <a href="#why">Why It Works</a>
          <a href="#ads">Custom Ads</a>
          <a href="#faq">FAQ</a>
        </div>

function Hero({ tweaks }) {
  const [count, setCount] = useState(0);

    let frame; let start = null; const duration = 1800; const target = 12400;

      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      setCount(Math.floor(p * p * target));
      if (p < 1) frame = requestAnimationFrame(animate);
    };
    const timer = setTimeout(() => { frame = requestAnimationFrame(animate); }, 600);
    return () => { clearTimeout(timer); cancelAnimationFrame(frame); };
  }, []);
  const leads = [

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  useReveal();

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <>
      <Nav tweaks={tweaks} />
      <Hero tweaks={tweaks} />
      <TrustBar />
      <HowItWorks />
      <AdsShowcase />
      <WhyItWorks />

      <Footer />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </>
  );
}
