<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treat Engine — Sales & Marketing for Water Treatment Dealers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --cream:     #faf7f2;
  --cream-mid: #f0ebe0;
  --cream-dark:#e5ddd0;
  --ink:       #1c1814;
  --ink-mid:   #3d3530;
  --ink-muted: #7a6f65;
  --navy:      #1a2744;
  --navy-light:#243460;
  --gold:      oklch(0.72 0.10 72);
  --gold-dark: oklch(0.58 0.12 68);
  --blue:      #3b82f6;
  --blue-light: #eff6ff;
  --blue-dark:  #1d4ed8;
  --white:     #fffefb;
  --border:    rgba(28,24,20,0.10);
  --border-mid:rgba(28,24,20,0.06);
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.12;}
p{line-height:1.75;}
a{text-decoration:none;color:inherit;}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,247,242,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1180px;margin:0 auto;padding:0 32px;height:70px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo img{height:34px;width:auto;}
.nav-links{display:flex;align-items:center;gap:36px;}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--ink-muted);padding:7px 14px;border-radius:6px;letter-spacing:.01em;transition:all .2s;}
.nav-links a:hover{color:var(--ink);background:var(--cream-mid);}
.nav-links a.active{color:var(--blue);font-weight:600;background:var(--blue-light);}
.nav-cta{background:var(--blue);color:#fff;border:none;padding:11px 22px;border-radius:6px;font-size:13.5px;font-weight:600;cursor:pointer;letter-spacing:0.02em;transition:background .2s,transform .15s;font-family:'DM Sans',sans-serif;}
.nav-cta:hover{background:var(--blue-dark);transform:translateY(-1px);}

/* ── HERO ── */
.hero{padding:130px 32px 0;max-width:1180px;margin:0 auto;}
.hero-top{display:grid;grid-template-columns:1fr 420px;gap:80px;align-items:end;padding-bottom:72px;border-bottom:1px solid var(--border);}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:28px;}
.hero-tag-line{width:28px;height:1.5px;background:var(--blue);}
.hero h1{font-size:clamp(46px,5.5vw,74px);font-weight:600;color:var(--ink);margin-bottom:28px;line-height:1.06;letter-spacing:-0.02em;}
.hero h1 em{font-style:italic;color:var(--navy);}
.hero-sub{font-size:17px;color:var(--ink-muted);max-width:520px;margin-bottom:40px;font-weight:400;line-height:1.8;}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.btn-dark{background:var(--blue);color:#fff;border:none;padding:15px 28px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:0.01em;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-dark:hover{background:var(--blue-dark);transform:translateY(-2px);}
.btn-text{background:none;border:none;font-size:15px;font-weight:500;color:var(--ink-muted);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;padding:15px 0;transition:color .2s;}
.btn-text:hover{color:var(--ink);}
.hero-aside{padding-bottom:8px;}
.hero-aside-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:16px;}
.hero-stat-row{padding:18px 0;border-bottom:1px solid var(--border-mid);display:flex;flex-direction:column;gap:4px;}
.hero-stat-row:last-child{border-bottom:none;}
.hero-stat-num{font-family:'Playfair Display',serif;font-size:38px;font-weight:600;color:var(--navy);line-height:1;}
.hero-stat-label{font-size:13px;color:var(--ink-muted);}

/* Ticker */
.hero-ticker{padding:22px 0;overflow:hidden;white-space:nowrap;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:0;}
.hero-ticker-inner{display:inline-flex;gap:0;animation:ticker 28s linear infinite;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.hero-ticker-item{display:inline-flex;align-items:center;gap:12px;padding:0 32px;font-size:13px;color:var(--ink-muted);font-weight:500;}
.hero-ticker-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0;}

/* ── TRUST ── */
.trust{padding:60px 32px;background:var(--white);}
.trust-inner{max-width:1180px;margin:0 auto;}
.trust-label{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:28px;}
.trust-logos{display:flex;align-items:center;gap:52px;flex-wrap:wrap;}
.trust-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--ink);opacity:0.3;transition:opacity .2s;letter-spacing:0.01em;}
.trust-logo:hover{opacity:0.7;}

/* ── SECTION SHARED ── */
.section{padding:110px 32px;}
.section-inner{max-width:1180px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';display:block;width:20px;height:1.5px;background:var(--blue);}
.section-title{font-size:clamp(30px,3.8vw,50px);font-weight:600;color:var(--ink);margin-bottom:20px;letter-spacing:-0.02em;}
.section-sub{font-size:16.5px;color:var(--ink-muted);max-width:540px;line-height:1.8;}

/* ── HOW IT WORKS ── */
.how-section{background:var(--white);}
.how-header{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:end;margin-bottom:72px;padding-bottom:56px;border-bottom:1px solid var(--border);}
.how-steps{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.how-step{padding:36px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative;}
.how-step:nth-child(odd){padding-right:40px;border-right:1px solid var(--border);}
.how-step:nth-child(even){padding-left:40px;}
.how-step:nth-last-child(-n+2){border-bottom:none;}
.how-step-num{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--ink-muted);margin-bottom:14px;letter-spacing:0.06em;}
.how-step-title{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:8px;font-family:'Playfair Display',serif;transition:color .2s;}
.how-step:hover .how-step-title{color:var(--navy);}
.how-step-desc{font-size:13.5px;color:var(--ink-muted);line-height:1.7;}

/* ── ADS ── */
.ads-section{background:var(--navy);padding:110px 32px;}
.ads-inner{max-width:1180px;margin:0 auto;}
.ads-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.ads-eyebrow::before{content:'';display:block;width:20px;height:1.5px;background:var(--blue);}
.ads-title{font-size:clamp(30px,3.8vw,50px);font-weight:600;color:#fff;margin-bottom:20px;letter-spacing:-0.02em;}
.ads-sub{font-size:16px;color:rgba(255,255,255,0.55);max-width:460px;line-height:1.8;margin-bottom:56px;}
.ads-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.ad-card{border-radius:10px;overflow:hidden;aspect-ratio:9/16;position:relative;cursor:pointer;}
.ad-card-bg{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;}
.ad-card:hover .ad-card-bg{filter:brightness(1.1);}
.ad-card-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.6);margin-bottom:8px;}
.ad-card-title{font-size:14px;font-weight:600;color:#fff;line-height:1.35;font-family:'Playfair Display',serif;}
.ad-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:all .2s;}
.ad-card:hover .ad-play{background:rgba(255,255,255,0.25);}

/* ── WHY ── */
.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:72px;border:1px solid var(--border);}
.why-card{padding:40px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);transition:background .2s;}
.why-card:hover{background:var(--white);}
.why-card:nth-child(even){border-right:none;}
.why-card:nth-last-child(-n+2){border-bottom:none;}
.why-num{font-family:'Playfair Display',serif;font-size:13px;color:var(--ink-muted);margin-bottom:20px;letter-spacing:0.06em;}
.why-title{font-size:19px;font-weight:600;color:var(--ink);margin-bottom:10px;font-family:'Playfair Display',serif;}
.why-desc{font-size:14px;color:var(--ink-muted);line-height:1.75;}

/* ── GUARANTEE ── */
.guarantee{background:var(--cream-mid);padding:110px 32px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.guarantee-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:96px;align-items:center;}
.guarantee-left{border-right:1px solid var(--border);padding-right:96px;}
.guarantee-number{font-family:'Playfair Display',serif;font-size:clamp(80px,12vw,148px);font-weight:700;color:var(--navy);line-height:1;letter-spacing:-0.04em;margin-bottom:-8px;}
.guarantee-word{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,38px);font-style:italic;color:var(--ink-muted);margin-bottom:4px;}
.guarantee-word2{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,38px);color:var(--ink-muted);margin-bottom:0;}
.guarantee-title{font-size:clamp(26px,3vw,40px);font-weight:600;margin-bottom:18px;letter-spacing:-0.02em;}
.guarantee-desc{font-size:16px;color:var(--ink-muted);margin-bottom:32px;line-height:1.8;}
.guarantee-list{list-style:none;margin-bottom:36px;}
.guarantee-list li{display:flex;align-items:flex-start;gap:12px;font-size:15px;color:var(--ink-mid);padding:10px 0;border-bottom:1px solid var(--border);}
.guarantee-list li:first-child{border-top:1px solid var(--border);}
.g-dash{color:var(--blue);font-weight:700;flex-shrink:0;margin-top:2px;}

/* ── TESTIMONIALS ── */
.testi-section{padding:110px 32px;background:var(--white);}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:72px;border:1px solid var(--border);}
.testi-card{padding:40px;border-right:1px solid var(--border);transition:background .2s;}
.testi-card:last-child{border-right:none;}
.testi-card:hover{background:var(--cream);}
.testi-quote{font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:var(--ink);line-height:1.7;margin-bottom:32px;}
.testi-quote::before{content:'\201C';font-size:48px;color:var(--cream-dark);display:block;line-height:0.8;margin-bottom:16px;font-style:normal;}
.testi-author{display:flex;align-items:center;gap:14px;padding-top:24px;border-top:1px solid var(--border);}
.testi-avatar{width:40px;height:40px;border-radius:50%;background:var(--cream-mid);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:14px;flex-shrink:0;border:1px solid var(--border);}
.testi-name{font-size:14px;font-weight:600;color:var(--ink);}
.testi-role{font-size:12px;color:var(--ink-muted);margin-top:2px;}
.testi-stars{color:var(--gold);font-size:12px;letter-spacing:2px;margin-bottom:20px;}

/* ── FAQ ── */
.faq-section{padding:110px 32px;}
.faq-inner{max-width:800px;margin:0 auto;}
.faq-list{margin-top:56px;}
.faq-item{border-bottom:1px solid var(--border);}
.faq-item:first-child{border-top:1px solid var(--border);}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:24px 0;cursor:pointer;gap:24px;}
.faq-q-text{font-size:16px;font-weight:500;color:var(--ink);font-family:'Playfair Display',serif;transition:color .2s;}
.faq-item.open .faq-q-text{color:var(--navy);}
.faq-q:hover .faq-q-text{color:var(--navy);}
.faq-icon{flex-shrink:0;transition:transform .25s;color:var(--ink-muted);}
.faq-item.open .faq-icon{transform:rotate(45deg);}
.faq-a{font-size:15px;color:var(--ink-muted);line-height:1.8;padding-bottom:24px;display:none;}
.faq-item.open .faq-a{display:block;}

/* ── CTA BANNER ── */
.cta-banner{background:var(--navy);padding:120px 32px;text-align:center;position:relative;overflow:hidden;}
.cta-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(59,130,246,0.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(255,200,80,0.06) 0%,transparent 60%);}
.cta-inner{max-width:640px;margin:0 auto;position:relative;}
.cta-tag{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:10px;}
.cta-tag::before,.cta-tag::after{content:'';display:block;width:28px;height:1px;background:var(--blue);}
.cta-banner h2{font-size:clamp(32px,5vw,58px);color:#fff;margin-bottom:20px;letter-spacing:-0.025em;}
.cta-banner h2 em{font-style:italic;opacity:0.7;}
.cta-banner p{font-size:17px;color:rgba(255,255,255,0.6);margin-bottom:44px;line-height:1.8;}
.cta-banner-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn-cream{background:var(--cream);color:var(--navy);border:none;padding:15px 30px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;letter-spacing:0.01em;}
.btn-cream:hover{background:#fff;transform:translateY(-2px);}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.7);border:1.5px solid rgba(255,255,255,0.2);padding:14px 28px;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-ghost:hover{border-color:rgba(255,255,255,0.5);color:#fff;}

/* ── FOOTER ── */
.footer{background:var(--ink);padding:72px 32px 40px;}
.footer-inner{max-width:1180px;margin:0 auto;}
.footer-top{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:56px;padding-bottom:56px;border-bottom:1px solid rgba(255,255,255,0.08);}
.footer-brand p{font-size:13.5px;color:rgba(255,255,255,0.4);margin-top:20px;line-height:1.75;max-width:260px;}
.footer-brand img{height:30px;filter:brightness(0) invert(1);}
.footer-col h4{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.3);margin-bottom:18px;}
.footer-col a{display:block;font-size:14px;color:rgba(255,255,255,0.55);margin-bottom:11px;transition:color .2s;}
.footer-col a:hover{color:#fff;}
.footer-bottom{padding-top:28px;display:flex;align-items:center;justify-content:space-between;}
.footer-copy{font-size:13px;color:rgba(255,255,255,0.25);}

/* Scroll reveal */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:none;}

@media(max-width:960px){
  .hero-top{grid-template-columns:1fr;gap:40px;padding:72px 0 48px;}
  .hero-right-col{display:none;}
  .how-header{grid-template-columns:1fr;}
  .how-steps{grid-template-columns:1fr;}
  .how-step:nth-child(odd){border-right:none;padding-right:0;}
  .how-step:nth-child(even){padding-left:0;}
  .how-step:nth-last-child(-n+2){border-bottom:1px solid var(--border);}
  .how-step:last-child{border-bottom:none;}
  .why-grid{grid-template-columns:1fr;}
  .why-card{border-right:none;border-bottom:1px solid var(--border);}
  .why-card:last-child{border-bottom:none;}
  .testi-grid{grid-template-columns:1fr;}
  .testi-card{border-right:none;border-bottom:1px solid var(--border);}
  .ads-grid{grid-template-columns:repeat(2,1fr);}
  .guarantee-inner{grid-template-columns:1fr;}
  .guarantee-left{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:48px;}
  .footer-top{grid-template-columns:1fr 1fr;gap:32px;}
  .nav-links{display:none;}
  .hero-micro-stats{flex-wrap:wrap;}
  .hero-micro-stat{min-width:50%;}
  .cta-inner{grid-template-columns:1fr;gap:48px;}
  .section{padding-left:20px;padding-right:20px;}
  .hero{padding-left:20px;padding-right:20px;}
}
@media(max-width:600px){
  .hero h1{font-size:clamp(34px,9vw,52px);}
  .hero-actions{flex-direction:column;align-items:stretch;}
  .hero-actions .btn-dark,.hero-actions .btn-text{width:100%;justify-content:center;}
  .ads-grid{grid-template-columns:1fr;}
  .footer-top{grid-template-columns:1fr;}
  .hero-micro-stat{min-width:100%;}
  .ads-section,.section{padding-left:20px;padding-right:20px;}
  .topbar-item:not(:first-child){display:none;}
  .topbar-divider{display:none;}
}
/* Video embed */
.hero-video-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 24px 64px rgba(28,24,20,0.12);background:var(--ink);aspect-ratio:16/9;position:relative;width:100%;}
.hero-video-wrap .wistia_embed{width:100%!important;height:100%!important;position:absolute;inset:0;}
.hero-video-badge{display:inline-flex;align-items:center;gap:8px;margin-top:14px;font-size:12px;color:var(--ink-muted);}
.hero-video-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0;animation:vbpulse 2s ease-in-out infinite;}
@keyframes vbpulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.25)}}

/* Rebuilt hero layout */
.hero{padding:0 32px;max-width:1180px;margin:0 auto;}
.hero-top{display:grid;grid-template-columns:1fr 480px;gap:72px;align-items:center;padding:100px 0 72px;border-bottom:1px solid var(--border);}
.hero-left-col{}
.hero-proof-bar{display:flex;align-items:center;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.hero-proof-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-muted);font-weight:500;}
.hero-proof-item svg{color:var(--blue);flex-shrink:0;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:24px;}
.hero-tag-line{width:20px;height:1.5px;background:var(--blue);}
.hero h1{font-size:clamp(40px,4.8vw,66px);font-weight:600;color:var(--ink);margin-bottom:24px;line-height:1.06;letter-spacing:-.025em;}
.hero h1 em{font-style:italic;color:var(--navy);}
.hero-sub{font-size:16.5px;color:var(--ink-muted);margin-bottom:36px;font-weight:400;line-height:1.8;max-width:480px;}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:32px;}
.btn-dark{background:var(--blue);color:#fff;border:none;padding:16px 32px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.01em;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-dark:hover{background:var(--blue-dark);transform:translateY(-2px);}

<script type="text/babel">
const {useState, useEffect, useRef} = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

}/*EDITMODE-END*/;

function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
    }, {threshold: 0.1});
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function Nav({tweaks}) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const ctaLabel = (tweaks && tweaks.ctaText) ? tweaks.ctaText : 'Book a Demo';
  return (
    <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
      <div className="nav-inner">
        <a href="Home.html"><img src="uploads/Treat Engine Logo .png" alt="Treat Engine" style={{height:34}}/></a>
        <div className="nav-links">
          <a href="Home.html">Home</a>
          <a href="Water Websites.html">Water Websites</a>
          <a href="index.html" className="active">Water Leads</a>
          <a href="Water Sales.html">Water Sales</a>
        </div>
      </div>
    </nav>
  );
}

function Hero({tweaks}) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    let frame, start = null;
    const dur = 2000, target = 12400;
    const go = ts => {
      if(!start) start = ts;
      const p = Math.min((ts-start)/dur, 1);
      const eased = 1 - Math.pow(1-p, 3);
      setCount(Math.floor(eased * target));
      if(p < 1) frame = requestAnimationFrame(go);
    };
    const t = setTimeout(() => { frame = requestAnimationFrame(go); }, 400);
    return () => { clearTimeout(t); cancelAnimationFrame(frame); };
  }, []);

  const tickerItems = [
    'Exclusive territory protection',
    'Done-for-you ad creative',
    'Pre-qualified appointments',
    'Facebook & Google campaigns',
    'Real-time reporting dashboard',
    'Month-to-month — no contracts',
  ];

  const lines = tweaks.headline.split('\n');

  return (
    <div>
      <div className="hero">
        <div className="hero-top reveal">
          <div className="hero-left-col">
            <div className="hero-tag">
              <span className="hero-tag-line"/>
              Exclusively for water treatment dealers
            </div>
            <h1>

            <p className="hero-sub">{tweaks.subheadline}</p>
            <div className="hero-actions">
              <a href="Water Leads Booking.html" className="btn-dark">{tweaks.ctaText} →</a>

            </div>
            <div className="hero-micro-stats">
              <div className="hero-micro-stat">
                <div className="hero-micro-num">{count.toLocaleString()}+</div>
                <div className="hero-micro-label">installs generated</div>
              </div>
              <div className="hero-micro-stat">
                <div className="hero-micro-num">200+</div>
                <div className="hero-micro-label">dealer partners</div>
              </div>
              <div className="hero-micro-stat">
                <div className="hero-micro-num">4.8×</div>
                <div className="hero-micro-label">avg. ROAS</div>
              </div>
            </div>
          </div>

              <span className="hero-ticker-dot" />
              {item}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

function TweaksPanel({tweaks, setTweaks, visible}) {
  if(!visible) return null;
  const update = (k,v) => {
    const next = {...tweaks, [k]: v};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: next}, '*');
  };
  const fieldStyle = {width:'100%',padding:'8px 10px',border:'1px solid var(--border)',borderRadius:6,fontSize:13,fontFamily:'DM Sans,sans-serif',background:'var(--cream)',color:'var(--ink)',resize:'none'};

    <div style={{position:'fixed',bottom:24,right:24,background:'var(--white)',borderRadius:12,boxShadow:'0 8px 40px rgba(28,24,20,0.12)',padding:24,width:300,zIndex:9999,border:'1px solid var(--border)',fontFamily:'DM Sans,sans-serif'}}>

        <input value={tweaks.ctaText} onChange={e=>update('ctaText',e.target.value)} style={fieldStyle} />

      <div style={{marginBottom:14}}>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:14,borderTop:'1px solid var(--border)'}}>
        <label style={{...labelStyle,margin:0}}>Show partner logos</label>
        <input type="checkbox" checked={tweaks.showTrustLogos} onChange={e=>update('showTrustLogos',e.target.checked)} style={{width:16,height:16,accentColor:'var(--navy)'}} />
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  useReveal();
  useEffect(() => {
    const h = e => {
      if(e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  return (
    <>
      <Nav tweaks={tweaks} />
      <Hero tweaks={tweaks} />
      <Trust tweaks={tweaks} />
      <HowItWorks />
      <AdsShowcase />
      <WhyItWorks />

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />

}
